<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commitments — Deadline Tracker</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666;
      --color-text-tertiary: #999;
      --color-text-danger: #c0392b;
      --color-text-success: #1a7a4a;
      --color-text-warning: #92610a;
      --color-text-info: #1a5ca8;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f5;
      --color-background-danger: #fdecea;
      --color-background-success: #e6f4ed;
      --color-background-warning: #fef3dc;
      --color-background-info: #e8f0fc;
      --color-border-primary: #d0d0d0;
      --color-border-secondary: #d8d8d8;
      --color-border-tertiary: #ebebeb;
      --color-border-danger: #e8a09a;
      --color-border-success: #7ec8a0;
      --color-border-info: #90b4e8;
      --border-radius-sm: 4px;
      --border-radius-md: 6px;
      --border-radius-lg: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      background: #fafafa;
      min-height: 100vh;
    }

    #root {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Export/Import toolbar */
    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px 0 0;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      margin-bottom: 0;
    }
    .toolbar-label {
      font-size: 11px;
      color: var(--color-text-tertiary);
      display: flex;
      align-items: center;
      margin-right: 4px;
    }


* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); color: var(--color-text-primary); }
.app { padding: 1.5rem 0; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.header h1 { font-size: 20px; font-weight: 500; }
.btn { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--color-text-primary); font-family: var(--font-sans); }
.btn:hover { background: var(--color-background-secondary); }
.btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.btn-primary:hover { opacity: 0.85; }
.btn-sm { padding: 3px 10px; font-size: 12px; }
.btn-danger { border-color: var(--color-border-danger); color: var(--color-text-danger); }
.btn-danger:hover { background: var(--color-background-danger); }

.tabs { display: flex; gap: 4px; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.5rem; }
.tab { padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: var(--color-text-primary); border-bottom-color: var(--color-text-primary); font-weight: 500; }

.overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
.metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.metric-val { font-size: 22px; font-weight: 500; }

.urgency-bar-wrap { margin-bottom: 1.5rem; }
.urgency-bar-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
.urgency-list { display: flex; flex-direction: column; gap: 6px; }
.urgency-item { display: grid; grid-template-columns: 160px 1fr 60px; align-items: center; gap: 10px; font-size: 13px; }
.urgency-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.urgency-track { background: var(--color-background-secondary); border-radius: 4px; height: 8px; overflow: hidden; }
.urgency-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
.urgency-score { font-size: 12px; color: var(--color-text-secondary); text-align: right; }

.cat-list { display: flex; flex-direction: column; gap: 12px; }
.cat-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.cat-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-title { font-size: 15px; font-weight: 500; flex: 1; }
.cat-meta { font-size: 12px; color: var(--color-text-secondary); }
.cat-chevron { font-size: 11px; color: var(--color-text-tertiary); transition: transform 0.2s; }
.cat-chevron.open { transform: rotate(90deg); }
.cat-body { border-top: 0.5px solid var(--color-border-tertiary); padding: 12px 16px; display: none; }
.cat-body.open { display: block; }
.task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.task-item { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; }
.task-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; }
.task-check { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.task-check.done { background: var(--color-background-success); border-color: var(--color-border-success); color: var(--color-text-success); }
.task-check.in-progress { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }
.task-name { flex: 1; font-size: 13px; font-weight: 500; }
.task-name.done { text-decoration: line-through; color: var(--color-text-secondary); }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
.badge-low { background: var(--color-background-success); color: var(--color-text-success); }
.badge-med { background: var(--color-background-warning); color: var(--color-text-warning); }
.badge-high { background: #FAEEDA; color: #854F0B; }
.badge-critical { background: var(--color-background-danger); color: var(--color-text-danger); }
.task-due { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; }
.task-detail { padding: 0 12px 12px; border-top: 0.5px solid var(--color-border-tertiary); display: none; }
.task-detail.open { display: block; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; font-size: 12px; }
.detail-field { display: flex; flex-direction: column; gap: 2px; }
.detail-label { color: var(--color-text-secondary); }
.detail-val { font-weight: 500; }
.progress-wrap { margin: 10px 0; }
.progress-label { font-size: 12px; color: var(--color-text-secondary); display: flex; justify-content: space-between; margin-bottom: 4px; }
.progress-track { background: var(--color-background-secondary); border-radius: 4px; height: 6px; }
.progress-fill { height: 100%; border-radius: 4px; background: var(--color-background-info); border: none; transition: width 0.3s; }
.substep-list { display: flex; flex-direction: column; gap: 4px; margin: 8px 0; }
.substep { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.substep-check { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--color-border-secondary); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; }
.substep-check.done { background: var(--color-background-success); border-color: var(--color-border-success); color: var(--color-text-success); }
.substep-text { flex: 1; }
.substep-text.done { text-decoration: line-through; color: var(--color-text-secondary); }
.task-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.notes-text { font-size: 12px; color: var(--color-text-secondary); font-style: italic; margin-top: 4px; }

.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1.5rem; width: min(500px, 92vw); max-height: 85vh; overflow-y: auto; }
.modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.form-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.form-field label { font-size: 12px; color: var(--color-text-secondary); }
.form-field input, .form-field textarea, .form-field select { font-family: var(--font-sans); font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); width: 100%; }
.form-field textarea { resize: vertical; min-height: 70px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
.substep-entry { display: flex; gap: 6px; margin-bottom: 6px; }
.substep-entry input { flex: 1; }
.substep-entry button { flex-shrink: 0; }
.added-substeps { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.added-substep-item { display: flex; align-items: center; justify-content: space-between; font-size: 12px; padding: 3px 8px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); }
.color-row { display: flex; gap: 8px; flex-wrap: wrap; }
.color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
.color-opt.selected { border-color: var(--color-text-primary); }
.progress-slider { width: 100%; }


    /* Calendar */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .cal-nav h2 { font-size: 15px; font-weight: 500; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { text-align: center; font-size: 11px; color: var(--color-text-secondary); padding: 4px 0; font-weight: 500; }
    .cal-cell { min-height: 80px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 5px; background: var(--color-background-primary); }
    .cal-cell.other-month { background: var(--color-background-secondary); opacity: 0.6; }
    .cal-cell.today { border-color: var(--color-text-primary); border-width: 1.5px; }
    .cal-day-num { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; font-weight: 500; }
    .cal-cell.today .cal-day-num { color: var(--color-text-primary); font-weight: 700; }
    .cal-event { font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; cursor: default; line-height: 1.4; }
    .cal-more { font-size: 10px; color: var(--color-text-tertiary); margin-top: 2px; }

  
    /* Quick-add FAB */
    .fab { position: fixed; bottom: 2rem; right: 2rem; width: 52px; height: 52px; border-radius: 50%;
      background: var(--color-text-primary); color: var(--color-background-primary); border: none;
      font-size: 24px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      display: flex; align-items: center; justify-content: center; z-index: 50;
      transition: transform 0.15s, box-shadow 0.15s; }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(0,0,0,0.22); }

    /* Plan My Week */
    .plan-card { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md);
      padding: 10px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
    .plan-hours-badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 600;
      background: var(--color-background-info); color: var(--color-text-info); white-space: nowrap; }

    /* Search bar */
    .search-bar { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; }
    .search-input { flex: 1; font-family: var(--font-sans); font-size: 13px; padding: 7px 10px;
      border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md);
      background: var(--color-background-primary); color: var(--color-text-primary); }
    .search-input:focus { outline: none; border-color: var(--color-text-primary); }

    /* Drag-to-reorder */
    .task-item.dragging { opacity: 0.4; }
    .task-item.drag-over { border-top: 2px solid var(--color-text-primary); }
</style>

<body>
  <div id="root">
    <div class="toolbar">
      <span class="toolbar-label">Data:</span>
      <button class="btn btn-sm" onclick="exportData()" title="Download your data as a JSON backup file">⬇ Export</button>
      <label class="btn btn-sm" style="cursor:pointer" title="Load a previously exported JSON backup">⬆ Import<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
    </div>
<div class="app" id="app">
  <div class="header">
    <h1>Commitments</h1>
    <button class="btn btn-primary" onclick="openAddCategory()">+ Add category</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('overview', this)">Overview</div>
    <div class="tab" onclick="switchTab('categories', this)">Categories</div>
    <div class="tab" onclick="switchTab('urgent', this)">Urgency queue</div>
    <div class="tab" onclick="switchTab('calendar', this)">Calendar</div>
    <div class="tab" onclick="switchTab('plan', this)">Plan week</div>
  </div>
  <div id="tab-overview"></div>
  <div id="tab-categories" style="display:none"></div>
  <div id="tab-urgent" style="display:none"></div>
  <div id="tab-calendar" style="display:none"></div>
  <div id="tab-plan" style="display:none"></div>
</div>

<div id="modal-root"></div>
  <button class="fab" onclick="openQuickAdd()" title="Quick add task">+</button>
  </div>
  <div id="modal-root"></div>
  <button class="fab" onclick="openQuickAdd()" title="Quick add task">+</button>

  <script>
const COLORS = ['#378ADD','#1D9E75','#D85A30','#D4537E','#7F77DD','#BA7517','#639922','#E24B4A','#888780'];

// ── Cross-tab sync via BroadcastChannel ──────────────────────────────
const bc = (typeof BroadcastChannel !== 'undefined') ? new BroadcastChannel('dltracker_sync') : null;
if (bc) bc.onmessage = () => { loadAndRender(); };

function broadcast() { if (bc) bc.postMessage('update'); }

// ── Persistence ───────────────────────────────────────────────────────
let state = { categories: [], openCats: {}, openTasks: {}, weeklyHours: 20 };

function save() {
  try { localStorage.setItem('dltracker', JSON.stringify(state)); } catch(e){}
  broadcast();
}

function load() {
  try {
    const d = localStorage.getItem('dltracker');
    if (d) state = JSON.parse(d);
  } catch(e){}
  if (!state.categories) state.categories = [];
  if (!state.openCats)   state.openCats   = {};
  if (!state.openTasks)  state.openTasks  = {};
  if (!state.weeklyHours) state.weeklyHours = 20;
}

function loadAndRender() { load(); render(); }

load();

// ── Helpers ────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,9); }

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  return Math.ceil((d - now) / 86400000);
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── Task progress (accounts for substeps OR manual slider) ─────────────
function taskProgress(task) {
  if (task.status === 'done') return 100;
  if (task.substeps && task.substeps.length > 0) {
    const done = task.substeps.filter(s => s.done).length;
    return Math.round((done / task.substeps.length) * 100);
  }
  return task.manualProgress || 0;
}

// Remaining hours after accounting for progress already done
function remainingHours(task) {
  const est = parseFloat(task.estimatedHours) || 1;
  const prog = taskProgress(task) / 100;
  return Math.max(0, est * (1 - prog));
}

// ── Capacity-aware urgency ─────────────────────────────────────────────
// Spread a task's remaining hours proportionally across weeks until its deadline,
// capped at weekly budget, then sum overload in the nearest window.
function hoursDemandedinWindow(windowDays) {
  let total = 0;
  for (const cat of state.categories) {
    for (const t of (cat.tasks || [])) {
      if (t.status === 'done' || t.recurring) continue;
      const days = daysUntil(t.dueDate);
      if (days === null || days < 0) continue;
      const rem = remainingHours(t);
      const totalDays = Math.max(days, 1);
      // Fraction of remaining hours that fall within the window
      const fraction = Math.min(windowDays, totalDays) / totalDays;
      total += rem * fraction;
    }
  }
  return total;
}

function capacityPressure(windowDays) {
  const available = (state.weeklyHours / 7) * windowDays;
  if (available <= 0) return 1;
  return hoursDemandedinWindow(windowDays) / available;
}

function urgencyScore(task) {
  if (task.status === 'done' || task.recurring) return 0;
  const days = daysUntil(task.dueDate);
  if (days === null) return 1;
  if (days < 0) return 0; // overdue but not shown as urgent — treated as done/hidden
  const rem = remainingHours(task);
  if (days === 0) return 100;

  // Base: remaining hours / days left, scaled
  const base = Math.min(90, Math.round((rem / Math.max(days, 0.5)) * 20));

  // Capacity pressure boost for the window up to this task's deadline
  const pressure = capacityPressure(days);
  const boost = pressure > 1 ? Math.min(10, Math.round((pressure - 1) * 10)) : 0;

  return Math.min(100, base + boost);
}

function urgencyColor(score) {
  if (score >= 75) return 'var(--color-text-danger)';
  if (score >= 50) return '#854F0B';
  if (score >= 25) return 'var(--color-text-warning)';
  return 'var(--color-text-success)';
}

function urgencyLabel(score) {
  if (score >= 75) return ['critical','Critical'];
  if (score >= 50) return ['high','High'];
  if (score >= 25) return ['med','Medium'];
  return ['low','Low'];
}

// ── Recurring expansion ────────────────────────────────────────────────
function expandRecurring(template) {
  const instances = [];
  if (!template.recurringFreq || !template.seriesEnd) return instances;
  const end  = new Date(template.seriesEnd + 'T00:00:00');
  const freqDays = template.recurringFreq === 'weekly' ? 7 : template.recurringFreq === 'biweekly' ? 14 : 1;
  let cur = new Date(template.dueDate + 'T00:00:00');
  while (cur <= end) {
    instances.push({
      id: uid(), name: template.name, dueDate: cur.toISOString().slice(0,10),
      estimatedHours: template.estimatedHours, priority: template.priority,
      notes: template.notes, substeps: (template.substeps||[]).map(s=>({...s,done:false})),
      status: 'not started', manualProgress: 0, recurringTemplateId: template.id
    });
    cur.setDate(cur.getDate() + freqDays);
  }
  return instances;
}

// ── Render orchestration ───────────────────────────────────────────────
let _activeTab = 'overview';

function render() {
  save();
  renderOverview();
  renderCategories();
  renderUrgent();
  if (_activeTab === 'calendar') renderCalendar();
  if (_activeTab === 'plan') renderPlan();
}

function switchTab(tab, el) {
  _activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['overview','categories','urgent','calendar','plan'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  if (tab === 'calendar') renderCalendar();
  if (tab === 'plan') renderPlan();
}

// ── getAllIncompleteTasks — excludes done, overdue-hidden, and templates ─
function getAllIncompleteTasks() {
  const tasks = [];
  for (const cat of state.categories) {
    for (const t of (cat.tasks || [])) {
      if (t.status === 'done' || t.recurring) continue;
      const days = daysUntil(t.dueDate);
      // Don't show overdue tasks as "urgent" — they need a different action
      tasks.push({ ...t, catName: cat.name, catColor: cat.color, catId: cat.id });
    }
  }
  return tasks;
}

// ── Overview ───────────────────────────────────────────────────────────
function renderOverview() {
  const allTasks = state.categories.flatMap(c => (c.tasks||[]).filter(t => !t.recurring));
  const total    = allTasks.length;
  const done     = allTasks.filter(t => t.status === 'done').length;
  const overdue  = allTasks.filter(t => t.status !== 'done' && t.dueDate && daysUntil(t.dueDate) < 0).length;
  const dueWeek  = allTasks.filter(t => t.status !== 'done' && t.dueDate && daysUntil(t.dueDate) >= 0 && daysUntil(t.dueDate) <= 7).length;

  const weekAvail    = state.weeklyHours;
  const weekDemanded = hoursDemandedinWindow(7);
  const capPct       = Math.min(100, Math.round((weekDemanded / Math.max(weekAvail, 1)) * 100));
  const capFill      = capPct >= 100 ? 'var(--color-text-danger)' : capPct >= 75 ? '#BA7517' : 'var(--color-text-success)';
  const capLabel     = capPct >= 100 ? 'var(--color-text-danger)' : capPct >= 75 ? '#854F0B' : 'var(--color-text-success)';

  let html = `<div class="overview-grid">
    <div class="metric"><div class="metric-label">Total tasks</div><div class="metric-val">${total}</div></div>
    <div class="metric"><div class="metric-label">Completed</div><div class="metric-val">${done}</div></div>
    <div class="metric"><div class="metric-label">Due this week</div><div class="metric-val">${dueWeek}</div></div>
    <div class="metric"><div class="metric-label">Overdue</div><div class="metric-val" style="color:${overdue>0?'var(--color-text-danger)':'inherit'}">${overdue}</div></div>
  </div>`;

  html += `<div class="urgency-bar-wrap" style="margin-bottom:1.5rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:12px;color:var(--color-text-secondary)">Weekly capacity (next 7 days)</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:${capLabel};font-weight:500">${weekDemanded.toFixed(1)}h demanded / ${weekAvail}h available</span>
        <button class="btn btn-sm" onclick="openCapacitySettings()" title="Change weekly hours">⚙</button>
      </div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:4px;height:10px;overflow:hidden">
      <div style="height:100%;width:${capPct}%;background:${capFill};border-radius:4px;transition:width 0.4s"></div>
    </div>
    ${capPct >= 100 ? `<div style="font-size:11px;color:var(--color-text-danger);margin-top:4px">⚠ Overcommitted by ${(weekDemanded - weekAvail).toFixed(1)}h this week</div>` : ''}
  </div>`;

  const pending = getAllIncompleteTasks().filter(t => t.dueDate && daysUntil(t.dueDate) >= 0);
  pending.sort((a,b) => urgencyScore(b) - urgencyScore(a));
  const top = pending.slice(0,5);
  if (top.length > 0) {
    const maxScore = urgencyScore(top[0]) || 1;
    html += `<div class="urgency-bar-wrap"><div class="urgency-bar-label">Top urgent tasks</div><div class="urgency-list">`;
    for (const t of top) {
      const score = urgencyScore(t);
      const days  = daysUntil(t.dueDate);
      const daysStr = days === 0 ? 'Due today' : `${days}d left`;
      const ck = t.status==='done'?'done':t.status==='in progress'?'in-progress':'';
      const cm = t.status==='done'?'✓':t.status==='in progress'?'●':'';
      html += `<div class="urgency-item">
        <div style="display:flex;align-items:center;gap:8px;overflow:hidden;min-width:0">
          <div class="task-check ${ck}" style="flex-shrink:0;cursor:pointer" onclick="cycleStatusById('${t.catId}','${t.id}')" title="Click to cycle status">${cm}</div>
          <div class="urgency-name" style="cursor:pointer;text-decoration-line:underline;text-decoration-style:dotted;text-underline-offset:3px" onclick="openTaskPanel('${t.catId}','${t.id}')">${t.name}</div>
        </div>
        <div class="urgency-track"><div class="urgency-fill" style="width:${(score/maxScore)*100}%;background:${urgencyColor(score)}"></div></div>
        <div class="urgency-score">${daysStr}</div>
      </div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById('tab-overview').innerHTML = html;
}

// ── Urgency Queue ──────────────────────────────────────────────────────
function renderUrgent() {
  // Separate overdue from upcoming
  const allInc = getAllIncompleteTasks().filter(t => t.dueDate);
  const overdue  = allInc.filter(t => daysUntil(t.dueDate) < 0).sort((a,b) => daysUntil(a.dueDate) - daysUntil(b.dueDate));
  const upcoming = allInc.filter(t => daysUntil(t.dueDate) >= 0).sort((a,b) => urgencyScore(b) - urgencyScore(a));
  const noDue    = getAllIncompleteTasks().filter(t => !t.dueDate);

  let html = '';
  if (overdue.length === 0 && upcoming.length === 0 && noDue.length === 0) {
    html = `<div style="font-size:13px;color:var(--color-text-secondary);text-align:center;padding:2rem 0">No pending tasks. 🎉</div>`;
  }

  function taskCard(t, score) {
    const days = daysUntil(t.dueDate);
    const daysStr = t.dueDate
      ? (days < 0 ? `${Math.abs(days)}d overdue` : days === 0 ? 'Due today' : `${days}d left`)
      : 'No due date';
    const ck = t.status==='done'?'done':t.status==='in progress'?'in-progress':'';
    const cm = t.status==='done'?'✓':t.status==='in progress'?'●':'';
    const rem = remainingHours(t);
    return `<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:4px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <div class="task-check ${ck}" style="cursor:pointer;flex-shrink:0" onclick="cycleStatusById('${t.catId}','${t.id}')" title="Click to cycle status">${cm}</div>
        <span style="font-size:13px;font-weight:500;flex:1;cursor:pointer;text-decoration-line:underline;text-decoration-style:dotted;text-underline-offset:3px" onclick="openTaskPanel('${t.catId}','${t.id}')">${t.name}</span>
        <span style="font-size:11px;color:var(--color-text-secondary)">${t.catName}</span>
        ${score > 0 ? `<span style="font-size:12px;font-weight:500;color:${urgencyColor(score)}">${score}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${score > 0 ? `<div class="urgency-track" style="flex:1"><div class="urgency-fill" style="width:${score}%;background:${urgencyColor(score)}"></div></div>` : '<div style="flex:1"></div>'}
        <span style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap">${daysStr}${rem > 0 ? ' · ' + rem.toFixed(1) + 'h rem.' : ''}</span>
      </div>
    </div>`;
  }

  if (overdue.length > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--color-text-danger);margin-bottom:8px">⚠ Overdue (${overdue.length})</div>`;
    for (const t of overdue) html += taskCard(t, 0);
    html += `<div style="margin-bottom:16px"></div>`;
  }
  if (upcoming.length > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px">Upcoming — by urgency</div>`;
    for (const t of upcoming) html += taskCard(t, urgencyScore(t));
  }
  if (noDue.length > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin:16px 0 8px">No due date</div>`;
    for (const t of noDue) html += taskCard(t, 1);
  }

  document.getElementById('tab-urgent').innerHTML = html;
}

// ── Categories ─────────────────────────────────────────────────────────
function renderCategories() {
  if (state.categories.length === 0) {
    document.getElementById('tab-categories').innerHTML = `<div style="font-size:13px;color:var(--color-text-secondary);text-align:center;padding:2rem 0">No categories yet. Click "+ Add category" to start.</div>`;
    return;
  }
  let html = `<div class="cat-list">`;
  for (const cat of state.categories) {
    const tasks     = cat.tasks || [];
    const templates = tasks.filter(t => t.recurring);
    const real      = tasks.filter(t => !t.recurring);
    const done      = real.filter(t => t.status === 'done').length;
    const isOpen    = state.openCats[cat.id];

    html += `<div class="cat-card">
      <div class="cat-header" onclick="toggleCat('${cat.id}')">
        <div class="cat-dot" style="background:${cat.color}"></div>
        <div class="cat-title">${cat.name}</div>
        <div class="cat-meta">${done}/${real.length} done</div>
        <div class="cat-chevron ${isOpen?'open':''}">&#9654;</div>
      </div>
      <div class="cat-body ${isOpen?'open':''}">`;

    if (cat.description) html += `<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">${cat.description}</div>`;

    // Recurring series headers
    if (templates.length > 0) {
      html += `<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;font-weight:500">🔁 Recurring series</div>`;
      for (const tmpl of templates) {
        const freq = tmpl.recurringFreq === 'weekly' ? 'Weekly' : tmpl.recurringFreq === 'biweekly' ? 'Every 2 weeks' : 'Daily';
        const insts = real.filter(t => t.recurringTemplateId === tmpl.id);
        const doneI = insts.filter(t => t.status === 'done').length;
        html += `<div style="border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 12px;margin-bottom:6px;background:var(--color-background-secondary)">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:500;flex:1">${tmpl.name}</span>
            <span style="font-size:11px;color:var(--color-text-secondary)">${freq} until ${formatDate(tmpl.seriesEnd)}</span>
            <span style="font-size:11px;color:var(--color-text-secondary)">${doneI}/${insts.length} done</span>
            <button class="btn btn-sm btn-danger" onclick="deleteRecurringSeries('${cat.id}','${tmpl.id}')">Delete series</button>
          </div>
        </div>`;
      }
    }

    // Show incomplete tasks + completed toggle
    const incomplete = real.filter(t => t.status !== 'done');
    const completed  = real.filter(t => t.status === 'done');
    if (incomplete.length > 0) {
      html += `<div class="task-list">`;
      for (const task of incomplete) html += renderTaskItem(cat, task);
      html += `</div>`;
    } else if (templates.length === 0) {
      html += `<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">No tasks yet.</div>`;
    }

    // Completed tasks — collapsible
    if (completed.length > 0) {
      const compId = 'comp-' + cat.id;
      const compOpen = state.openCats[compId];
      html += `<div style="margin-top:8px">
        <div style="font-size:12px;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;gap:6px" onclick="toggleCompletedSection('${cat.id}')">
          <span style="font-size:10px;transition:transform 0.2s;display:inline-block;transform:${compOpen?'rotate(90deg)':'rotate(0deg)'}">&#9654;</span>
          ${completed.length} completed task${completed.length!==1?'s':''}
        </div>`;
      if (compOpen) {
        html += `<div class="task-list" style="margin-top:8px;opacity:0.7">`;
        for (const task of completed) html += renderTaskItem(cat, task);
        html += `</div>`;
      }
      html += `</div>`;
    }

    html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
      <button class="btn btn-sm" onclick="openAddTask('${cat.id}')">+ Add task</button>
      <button class="btn btn-sm" onclick="openAddRecurring('${cat.id}')">+ Add recurring</button>
      <button class="btn btn-sm" onclick="openEditCategory('${cat.id}')">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteCategory('${cat.id}')">Delete</button>
    </div></div></div>`;
  }
  html += `</div>`;
  document.getElementById('tab-categories').innerHTML = html;
}

function toggleCompletedSection(catId) {
  const key = 'comp-' + catId;
  state.openCats[key] = !state.openCats[key];
  renderCategories();
}

function renderTaskItem(cat, task) {
  const isTaskOpen = state.openTasks[task.id];
  const prog = taskProgress(task);
  const score = urgencyScore(task);
  const [lvl, lbl] = urgencyLabel(score);
  const days = daysUntil(task.dueDate);
  const isDone = task.status === 'done';
  const isOverdue = !isDone && task.dueDate && days < 0;
  const daysStr = task.dueDate ? (days < 0 ? `${Math.abs(days)}d overdue` : days === 0 ? 'today' : `${days}d`) : '';
  const daysColor = isOverdue ? 'var(--color-text-danger)' : days !== null && days <= 3 ? '#BA7517' : 'var(--color-text-secondary)';
  const checkClass = isDone ? 'done' : prog > 0 ? 'in-progress' : '';
  const checkMark  = isDone ? '✓' : prog > 0 ? '●' : '';
  const rem = remainingHours(task);

  return `<div class="task-item" id="task-${task.id}"
      draggable="true"
      ondragstart="onDragStart(event,'${cat.id}','${task.id}')"
      ondragover="onDragOver(event,'${task.id}')"
      ondrop="onDrop(event,'${cat.id}','${task.id}')"
      ondragend="onDragEnd()">
    <div class="task-row" onclick="toggleTask('${task.id}')">
      <div class="task-check ${checkClass}" onclick="cycleStatus(event,'${cat.id}','${task.id}')">${checkMark}</div>
      <div class="task-name ${isDone?'done':''}">${task.name}${task.recurringTemplateId?'<span style="font-size:10px;color:var(--color-text-tertiary);margin-left:4px">🔁</span>':''}</div>
      ${!isDone && !isOverdue ? `<span class="badge badge-${lvl}">${lbl}</span>` : ''}
      ${isOverdue ? `<span class="badge" style="background:var(--color-background-danger);color:var(--color-text-danger)">Overdue</span>` : ''}
      ${task.dueDate ? `<span class="task-due" style="color:${daysColor}">${formatDate(task.dueDate)}${daysStr?' ('+daysStr+')':''}</span>` : ''}
    </div>
    <div class="task-detail ${isTaskOpen?'open':''}">
      <div class="detail-grid">
        ${task.dueDate   ? `<div class="detail-field"><div class="detail-label">Due date</div><div class="detail-val">${formatDate(task.dueDate)}</div></div>` : ''}
        ${task.estimatedHours ? `<div class="detail-field"><div class="detail-label">Est. / Remaining</div><div class="detail-val">${task.estimatedHours}h / ${rem.toFixed(1)}h</div></div>` : ''}
        ${task.priority  ? `<div class="detail-field"><div class="detail-label">Priority</div><div class="detail-val">${task.priority}</div></div>` : ''}
        <div class="detail-field"><div class="detail-label">Status</div><div class="detail-val">${task.status||'not started'}</div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Progress</span><span id="prog-label-${task.id}">${prog}%</span></div>
        <div class="progress-track"><div class="progress-fill" id="prog-fill-${task.id}" style="width:${prog}%"></div></div>
        ${(!task.substeps || task.substeps.length === 0) ? `
          <div style="margin-top:8px;display:flex;align-items:center;gap:10px">
            <input type="range" min="0" max="100" value="${task.manualProgress||0}" step="5"
              style="flex:1;cursor:pointer;accent-color:var(--color-text-info)"
              oninput="updateProgressLive('${cat.id}','${task.id}',this.value)"
              onchange="setManualProgress('${cat.id}','${task.id}',this.value)">
            <span style="font-size:12px;min-width:34px;text-align:right" id="prog-val-${task.id}">${task.manualProgress||0}%</span>
          </div>` : ''}
      </div>
      ${(task.substeps && task.substeps.length > 0) ? `
        <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">Substeps</div>
        <div class="substep-list">${task.substeps.map((s,i) =>
          `<div class="substep">
            <div class="substep-check ${s.done?'done':''}" onclick="toggleSubstep('${cat.id}','${task.id}',${i})">${s.done?'✓':''}</div>
            <span class="substep-text ${s.done?'done':''}">${s.text}</span>
          </div>`).join('')}</div>` : ''}
      ${task.notes ? `<div style="font-size:12px;color:var(--color-text-secondary);margin-top:6px;margin-bottom:2px">Notes</div><div class="notes-text">${task.notes}</div>` : ''}
      <div class="task-actions">
        <button class="btn btn-sm" onclick="openEditTask('${cat.id}','${task.id}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteTask('${cat.id}','${task.id}')">Delete</button>
      </div>
    </div>
  </div>`;
}

// Live slider update (no full re-render — just update labels and fill bar)
function updateProgressLive(catId, taskId, val) {
  const v = parseInt(val);
  const labelEl = document.getElementById('prog-label-' + taskId);
  const valEl   = document.getElementById('prog-val-'   + taskId);
  const fillEl  = document.getElementById('prog-fill-'  + taskId);
  if (labelEl) labelEl.textContent = v + '%';
  if (valEl)   valEl.textContent   = v + '%';
  if (fillEl)  fillEl.style.width  = v + '%';
}

// On slider release — persist to state
function setManualProgress(catId, taskId, val) {
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat.tasks.find(t => t.id === taskId);
  task.manualProgress = parseInt(val);
  if (task.manualProgress === 100) task.status = 'done';
  save(); // Don't full re-render, just save
}

// ── Interactions ───────────────────────────────────────────────────────
function toggleCat(id)  { state.openCats[id]   = !state.openCats[id];  renderCategories(); }
function toggleTask(id) { state.openTasks[id]  = !state.openTasks[id]; renderCategories(); }

function cycleStatus(e, catId, taskId) {
  e.stopPropagation();
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat.tasks.find(t => t.id === taskId);
  const cycle = ['not started','in progress','done'];
  const cur   = cycle.indexOf(task.status || 'not started');
  task.status = cycle[(cur + 1) % cycle.length];
  if (task.status === 'done') task.manualProgress = 100;
  render();
}

function cycleStatusById(catId, taskId) {
  const cat  = state.categories.find(c => c.id === catId);
  if (!cat) return;
  const task = cat.tasks.find(t => t.id === taskId);
  if (!task) return;
  const cycle = ['not started','in progress','done'];
  const cur   = cycle.indexOf(task.status || 'not started');
  task.status = cycle[(cur + 1) % cycle.length];
  if (task.status === 'done') task.manualProgress = 100;
  render();
}

function toggleSubstep(catId, taskId, idx) {
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat.tasks.find(t => t.id === taskId);
  task.substeps[idx].done = !task.substeps[idx].done;
  // Auto-complete task when all substeps done
  if (task.substeps.every(s => s.done)) task.status = 'done';
  render();
}

function deleteTask(catId, taskId) {
  const cat = state.categories.find(c => c.id === catId);
  cat.tasks = cat.tasks.filter(t => t.id !== taskId);
  render();
}

function deleteRecurringSeries(catId, templateId) {
  if (!confirm('Delete this recurring series and all its instances?')) return;
  const cat = state.categories.find(c => c.id === catId);
  cat.tasks = cat.tasks.filter(t => t.id !== templateId && t.recurringTemplateId !== templateId);
  render();
}

function deleteCategory(catId) {
  if (!confirm('Delete this category and all its tasks?')) return;
  state.categories = state.categories.filter(c => c.id !== catId);
  render();
}

// ── Modals ─────────────────────────────────────────────────────────────
let editingCatId = null, editingTaskId = null, tempSubsteps = [];

function openAddCategory() {
  editingCatId = null;
  showModal(`<h2>Add category</h2>
    <div class="form-field"><label>Name</label><input id="f-name" placeholder="e.g. Roman Law, Research"></div>
    <div class="form-field"><label>Description (optional)</label><input id="f-desc" placeholder="Brief description"></div>
    <div class="form-field"><label>Color</label><div class="color-row" id="color-row">${COLORS.map(c=>`<div class="color-opt" style="background:${c}" data-color="${c}" onclick="selectColor('${c}',this)"></div>`).join('')}</div></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveCategory()">Add</button></div>`);
  selectColor(COLORS[0], document.querySelector('.color-opt'));
}

function openEditCategory(catId) {
  editingCatId = catId;
  const cat = state.categories.find(c => c.id === catId);
  showModal(`<h2>Edit category</h2>
    <div class="form-field"><label>Name</label><input id="f-name" value="${cat.name}"></div>
    <div class="form-field"><label>Description</label><input id="f-desc" value="${cat.description||''}"></div>
    <div class="form-field"><label>Color</label><div class="color-row" id="color-row">${COLORS.map(c=>`<div class="color-opt" style="background:${c}" data-color="${c}" onclick="selectColor('${c}',this)"></div>`).join('')}</div></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveCategory()">Save</button></div>`);
  const sel = document.querySelector(`.color-opt[data-color="${cat.color}"]`);
  if (sel) selectColor(cat.color, sel);
}

function selectColor(color, el) {
  document.querySelectorAll('.color-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  window._selectedColor = color;
}

function saveCategory() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  const color = window._selectedColor || COLORS[0];
  const desc  = document.getElementById('f-desc').value.trim();
  if (editingCatId) {
    const cat = state.categories.find(c => c.id === editingCatId);
    cat.name = name; cat.color = color; cat.description = desc;
  } else {
    state.categories.push({ id: uid(), name, color, description: desc, tasks: [] });
  }
  closeModal(); render();
}

function openAddTask(catId)  { editingCatId = catId; editingTaskId = null; tempSubsteps = []; showTaskModal(null); }
function openEditTask(catId, taskId) {
  editingCatId = catId; editingTaskId = taskId;
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat.tasks.find(t => t.id === taskId);
  tempSubsteps = (task.substeps||[]).map(s=>({...s}));
  showTaskModal(task);
}

function showTaskModal(task) {
  const v = task || {};
  showModal(`<h2>${task?'Edit task':'Add task'}</h2>
    <div class="form-field"><label>Task name</label><input id="f-tname" placeholder="Task name" value="${v.name||''}"></div>
    <div class="form-field"><label>Due date</label><input id="f-due" type="date" value="${v.dueDate||''}"></div>
    <div class="form-field"><label>Estimated hours</label><input id="f-est" type="number" min="0" step="0.5" placeholder="e.g. 3" value="${v.estimatedHours||''}"></div>
    <div class="form-field"><label>Priority</label><select id="f-pri"><option value="">—</option><option ${v.priority==='Low'?'selected':''}>Low</option><option ${v.priority==='Medium'?'selected':''}>Medium</option><option ${v.priority==='High'?'selected':''}>High</option><option ${v.priority==='Critical'?'selected':''}>Critical</option></select></div>
    <div class="form-field"><label>Substeps</label>
      <div class="substep-entry"><input id="f-substep" placeholder="Add a substep..."><button class="btn btn-sm" onclick="addSubstep()">Add</button></div>
      <div class="added-substeps" id="substep-list">${renderTempSubsteps()}</div>
    </div>
    <div class="form-field"><label>Notes</label><textarea id="f-notes" placeholder="Any additional notes...">${v.notes||''}</textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveTask()">${task?'Save':'Add task'}</button></div>`);
}

function openAddRecurring(catId) {
  editingCatId = catId;
  const today = new Date().toISOString().slice(0,10);
  showModal(`<h2>Add recurring task</h2>
    <div class="form-field"><label>Task name</label><input id="f-tname" placeholder="e.g. Prepare for Roman Law"></div>
    <div class="form-field"><label>First occurrence (due date)</label><input id="f-due" type="date" value="${today}"></div>
    <div class="form-field"><label>Frequency</label>
      <select id="f-freq"><option value="weekly">Weekly</option><option value="biweekly">Every 2 weeks</option><option value="daily">Daily</option></select></div>
    <div class="form-field"><label>Series end date</label><input id="f-series-end" type="date"></div>
    <div class="form-field"><label>Estimated hours (per occurrence)</label><input id="f-est" type="number" min="0" step="0.5" placeholder="e.g. 2"></div>
    <div class="form-field"><label>Priority</label><select id="f-pri"><option value="">—</option><option>Low</option><option>Medium</option><option>High</option><option>Critical</option></select></div>
    <div class="form-field"><label>Notes</label><textarea id="f-notes" placeholder="Any additional notes..."></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveRecurring()">Create series</button></div>`);
}

function saveRecurring() {
  const name = document.getElementById('f-tname').value.trim();
  const dueDate   = document.getElementById('f-due').value;
  const seriesEnd = document.getElementById('f-series-end').value;
  if (!name || !dueDate || !seriesEnd) { alert('Please fill in name, first date, and end date.'); return; }
  if (seriesEnd < dueDate) { alert('End date must be after first occurrence.'); return; }
  const cat = state.categories.find(c => c.id === editingCatId);
  const templateId = uid();
  const template = {

// ── Calendar view ──────────────────────────────────────────────────────
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();

function calMonthName(m) {
  return ['January','February','March','April','May','June','July','August','September','October','November','December'][m];
}

function renderCalendar() {
  const today    = new Date(); today.setHours(0,0,0,0);
  const eventMap = {};
  for (const cat of state.categories) {
    for (const task of (cat.tasks||[])) {
      if (!task.dueDate || task.recurring) continue;
      if (!eventMap[task.dueDate]) eventMap[task.dueDate] = [];
      eventMap[task.dueDate].push({ name: task.name, color: cat.color, done: task.status==='done' });
    }
  }
  const firstDay    = new Date(calYear, calMonth, 1);
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const startDow    = firstDay.getDay();
  const prevEnd     = new Date(calYear, calMonth, 0).getDate();

  let html = `<div class="cal-nav">
    <button class="btn btn-sm" onclick="calPrev()">&#8592;</button>
    <h2>${calMonthName(calMonth)} ${calYear}</h2>
    <button class="btn btn-sm" onclick="calNext()">&#8594;</button>
  </div>
  <div class="cal-grid">
    <div class="cal-dow">Sun</div><div class="cal-dow">Mon</div><div class="cal-dow">Tue</div>
    <div class="cal-dow">Wed</div><div class="cal-dow">Thu</div><div class="cal-dow">Fri</div><div class="cal-dow">Sat</div>`;

  for (let i = startDow - 1; i >= 0; i--) {
    const d = prevEnd - i;
    const m = calMonth === 0 ? 11 : calMonth - 1;
    const y = calMonth === 0 ? calYear - 1 : calYear;
    html += renderCalCell(d, `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, eventMap, true, false);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr  = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday  = new Date(calYear, calMonth, d).getTime() === today.getTime();
    html += renderCalCell(d, dateStr, eventMap, false, isToday);
  }
  const total = Math.ceil((startDow + daysInMonth) / 7) * 7;
  let nd = 1;
  for (let i = startDow + daysInMonth; i < total; i++) {
    const m = calMonth === 11 ? 0 : calMonth + 1;
    const y = calMonth === 11 ? calYear + 1 : calYear;
    html += renderCalCell(nd++, `${y}-${String(m+1).padStart(2,'0')}-${String(nd).padStart(2,'0')}`, eventMap, true, false);
  }
  html += `</div>`;
  document.getElementById('tab-calendar').innerHTML = html;
}

function renderCalCell(dayNum, dateStr, eventMap, otherMonth, isToday) {
  const events = eventMap[dateStr] || [];
  let html = `<div class="cal-cell${otherMonth?' other-month':''}${isToday?' today':''}">`;
  html += `<div class="cal-day-num">${dayNum}</div>`;
  for (const ev of events.slice(0,3)) {
    const bg = ev.done ? '#aaa' : ev.color;
    html += `<div class="cal-event" style="background:${bg};${ev.done?'text-decoration:line-through;opacity:0.65':''}" title="${ev.name}">${ev.name}</div>`;
  }
  if (events.length > 3) html += `<div class="cal-more">+${events.length - 3} more</div>`;
  html += `</div>`;
  return html;
}

function calPrev() { calMonth--; if (calMonth < 0)  { calMonth = 11; calYear--; } renderCalendar(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0;  calYear++; } renderCalendar(); }

// ── Export / Import ────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'commitments-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imp = JSON.parse(e.target.result);
      if (!imp.categories) throw new Error('Invalid format');
      if (!confirm('This will replace all current data. Continue?')) return;
      state = imp;
      if (!state.openCats)    state.openCats    = {};
      if (!state.openTasks)   state.openTasks   = {};
      if (!state.weeklyHours) state.weeklyHours = 20;
      render();
      alert('Data imported successfully!');
    } catch(err) { alert('Failed to import: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function openTaskPanel(catId, taskId) {

        <h2 style="font-size:16px;font-weight:500;margin-bottom:4px">${task.name}</h2>

          ${!isDone && !isOverdue && score > 0 ? `<span class="badge badge-${lvl}">${lbl}</span>` : ''}
          ${isOverdue ? `<span class="badge" style="background:var(--color-background-danger);color:var(--color-text-danger)">Overdue</span>` : ''}
        </div>
      </div>
      <button class="btn btn-sm" onclick="panelCycleStatus('${catId}','${taskId}')" style="white-space:nowrap">

    <div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">
      ${task.estimatedHours ? `<div><div style="font-size:11px;color:var(--color-text-secondary)">Estimated</div><div style="font-size:13px;font-weight:500">${task.estimatedHours}h</div></div>` : ''}
      ${task.estimatedHours ? `<div><div style="font-size:11px;color:var(--color-text-secondary)">Remaining</div><div style="font-size:13px;font-weight:500">${rem.toFixed(1)}h</div></div>` : ''}
      ${task.priority ? `<div><div style="font-size:11px;color:var(--color-text-secondary)">Priority</div><div style="font-size:13px;font-weight:500">${task.priority}</div></div>` : ''}
      <div><div style="font-size:11px;color:var(--color-text-secondary)">Status</div><div style="font-size:13px;font-weight:500">${task.status||'not started'}</div></div>
    </div>

    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">
        <span>Progress</span><span id="panel-prog-label">${prog}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="panel-prog-fill" style="width:${prog}%"></div></div>
      ${(!task.substeps || task.substeps.length === 0) ? `
        <div style="margin-top:8px;display:flex;align-items:center;gap:10px">
          <input type="range" min="0" max="100" value="${task.manualProgress||0}" step="5"
            style="flex:1;cursor:pointer;accent-color:var(--color-text-info)"
            oninput="panelProgressLive(this.value)"
            onchange="panelProgressSave('${catId}','${taskId}',this.value)">
          <span style="font-size:12px;min-width:34px;text-align:right" id="panel-prog-val">${task.manualProgress||0}%</span>
        </div>` : ''}
    </div>

    ${(task.substeps && task.substeps.length > 0) ? `
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;font-weight:500">Substeps</div>
      <div class="substep-list" style="margin-bottom:14px">
        ${task.substeps.map((s,i) =>
          `<div class="substep">
            <div class="substep-check ${s.done?'done':''}" onclick="panelToggleSubstep('${catId}','${taskId}',${i})">${s.done?'✓':''}</div>
            <span class="substep-text ${s.done?'done':''}">${s.text}</span>
          </div>`).join('')}
      </div>` : ''}

    ${task.notes ? `<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;font-weight:500">Notes</div><div class="notes-text" style="margin-bottom:14px">${task.notes}</div>` : ''}

    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
      <span style="font-size:11px;color:var(--color-text-secondary)">Snooze:</span>

        <button class="btn btn-sm" onclick="snoozeTask('${catId}','${taskId}',1)">+1 day</button>

function panelProgressLive(val) {
  const v = parseInt(val);
  const l = document.getElementById('panel-prog-label');
  const b = document.getElementById('panel-prog-fill');
  const s = document.getElementById('panel-prog-val');
  if (l) l.textContent = v + '%';
  if (b) b.style.width = v + '%';
  if (s) s.textContent = v + '%';
}

function panelProgressSave(catId, taskId, val) {
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat.tasks.find(t => t.id === taskId);
  task.manualProgress = parseInt(val);
  if (task.manualProgress === 100) task.status = 'done';
  save();
  // Re-render the panel in place
  openTaskPanel(catId, taskId);
}

function panelCycleStatus(catId, taskId) {
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat.tasks.find(t => t.id === taskId);
  const cycle = ['not started','in progress','done'];
  const cur   = cycle.indexOf(task.status || 'not started');
  task.status = cycle[(cur + 1) % 3];
  if (task.status === 'done') task.manualProgress = 100;
  save();
  openTaskPanel(catId, taskId); // refresh panel
  renderOverview(); renderUrgent(); renderCategories();
}

function panelToggleSubstep(catId, taskId, idx) {
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat.tasks.find(t => t.id === taskId);
  task.substeps[idx].done = !task.substeps[idx].done;
  if (task.substeps.every(s => s.done)) task.status = 'done';
  save();
  openTaskPanel(catId, taskId);
  renderOverview(); renderUrgent(); renderCategories();
}


// ── SNOOZE ─────────────────────────────────────────────────────────────
function snoozeTask(catId, taskId, days) {
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat.tasks.find(t => t.id === taskId);
  if (!task.dueDate) return;
  const d = new Date(task.dueDate + 'T00:00:00');
  d.setDate(d.getDate() + days);
  task.dueDate = d.toISOString().slice(0, 10);
  save();
  openTaskPanel(catId, taskId); // refresh panel
  renderOverview(); renderUrgent(); renderCategories();
}

// ── PLAN MY WEEK ───────────────────────────────────────────────────────
function renderPlan() {
  const weekAvail = state.weeklyHours;
  const tasks     = getAllIncompleteTasks().filter(t => t.dueDate && daysUntil(t.dueDate) >= 0);

  // Score: urgency + proportion of remaining hours relative to days
  tasks.sort((a,b) => urgencyScore(b) - urgencyScore(a));

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <div>
      <div style="font-size:15px;font-weight:500">This week's focus</div>
      <div style="font-size:12px;color:var(--color-text-secondary);margin-top:2px">
        ${weekAvail}h available · tasks ranked by urgency · click to open
      </div>
    </div>
    <button class="btn btn-sm" onclick="openCapacitySettings()">⚙ ${weekAvail}h/week</button>
  </div>`;

  // Overdue section
  const overdue = getAllIncompleteTasks().filter(t => t.dueDate && daysUntil(t.dueDate) < 0);
  if (overdue.length > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--color-text-danger);margin-bottom:8px">⚠ Overdue — handle first</div>`;
    for (const t of overdue) {
      const rem = remainingHours(t);
      html += `<div class="plan-card" style="cursor:pointer;border-color:var(--color-border-danger)" onclick="openTaskPanel('${t.catId}','${t.id}')">
        <div style="width:8px;height:8px;border-radius:50%;background:${t.catColor};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500">${t.name}</div>
          <div style="font-size:11px;color:var(--color-text-secondary)">${t.catName} · ${Math.abs(daysUntil(t.dueDate))}d overdue</div>
        </div>
        ${rem > 0 ? `<span class="plan-hours-badge">${rem.toFixed(1)}h left</span>` : ''}
      </div>`;
    }
    html += `<div style="margin-bottom:16px"></div>`;
  }

  // Allocate tasks up to weekly budget
  let allocated = 0;
  const inBudget = [], overflow = [];
  for (const t of tasks) {
    const rem = remainingHours(t);
    const days = daysUntil(t.dueDate);
    // Hours to do this week: proportional share capped at remaining
    const weeksLeft  = Math.max(days / 7, 0.14);
    const weeklyShare = Math.min(rem, rem / weeksLeft);
    if (allocated + weeklyShare <= weekAvail * 1.1) {
      inBudget.push({ t, weeklyShare });
      allocated += weeklyShare;
    } else {
      overflow.push({ t, weeklyShare });
    }
  }

  const pct = Math.min(100, Math.round((allocated / Math.max(weekAvail,1)) * 100));
  const barColor = pct >= 100 ? 'var(--color-text-danger)' : pct >= 80 ? '#BA7517' : 'var(--color-text-success)';

  html += `<div style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">
      <span>Suggested load this week</span>
      <span style="color:${barColor};font-weight:500">${allocated.toFixed(1)}h / ${weekAvail}h</span>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:4px;height:8px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;transition:width 0.4s"></div>
    </div>
  </div>`;

  if (inBudget.length === 0 && overdue.length === 0) {
    html += `<div style="text-align:center;padding:2rem;font-size:13px;color:var(--color-text-secondary)">🎉 Nothing urgent this week!</div>`;
  }

  if (inBudget.length > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px">Suggested focus</div>`;
    for (const { t, weeklyShare } of inBudget) {
      const score = urgencyScore(t);
      const days  = daysUntil(t.dueDate);
      const daysStr = days === 0 ? 'Due today' : `${days}d left`;
      const [lvl] = urgencyLabel(score);
      html += `<div class="plan-card" style="cursor:pointer" onclick="openTaskPanel('${t.catId}','${t.id}')">
        <div style="width:8px;height:8px;border-radius:50%;background:${t.catColor};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500">${t.name}</div>
          <div style="font-size:11px;color:var(--color-text-secondary)">${t.catName} · ${daysStr}</div>
        </div>
        <span class="badge badge-${lvl}" style="flex-shrink:0">${score}</span>
        <span class="plan-hours-badge">${weeklyShare.toFixed(1)}h this week</span>
      </div>`;
    }
  }

  if (overflow.length > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin:16px 0 8px">Later / lower priority</div>`;
    for (const { t } of overflow) {
      html += `<div class="plan-card" style="cursor:pointer;opacity:0.65" onclick="openTaskPanel('${t.catId}','${t.id}')">
        <div style="width:8px;height:8px;border-radius:50%;background:${t.catColor};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500">${t.name}</div>
          <div style="font-size:11px;color:var(--color-text-secondary)">${t.catName} · ${daysUntil(t.dueDate)}d left</div>
        </div>
      </div>`;
    }
  }

  document.getElementById('tab-plan').innerHTML = html;
}

// ── DRAG TO REORDER ────────────────────────────────────────────────────
let _dragCatId = null, _dragTaskId = null, _dragOverTaskId = null;

function onDragStart(e, catId, taskId) {
  _dragCatId   = catId;
  _dragTaskId  = taskId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.getElementById('task-' + taskId);
    if (el) el.classList.add('dragging');
  }, 0);
}

function onDragOver(e, taskId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (taskId === _dragOverTaskId) return;
  // Clear previous
  document.querySelectorAll('.task-item.drag-over').forEach(el => el.classList.remove('drag-over'));
  _dragOverTaskId = taskId;
  const el = document.getElementById('task-' + taskId);
  if (el) el.classList.add('drag-over');
}

function onDragEnd() {
  document.querySelectorAll('.task-item').forEach(el => {
    el.classList.remove('dragging');
    el.classList.remove('drag-over');
  });
}

function onDrop(e, catId, taskId) {
  e.preventDefault();
  onDragEnd();
  if (!_dragTaskId || _dragTaskId === taskId || _dragCatId !== catId) return;
  const cat   = state.categories.find(c => c.id === catId);
  const tasks = cat.tasks;
  const fromIdx = tasks.findIndex(t => t.id === _dragTaskId);
  const toIdx   = tasks.findIndex(t => t.id === taskId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = tasks.splice(fromIdx, 1);
  tasks.splice(toIdx, 0, moved);
  _dragTaskId = null; _dragOverTaskId = null;
  render();
}

// ── Boot ───────────────────────────────────────────────────────────────
render();
</script>
