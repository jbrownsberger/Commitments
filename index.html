// ── QUICK TASKS (Change 2) ────────────────────────────────────────────────
function renderQuickPanel() {
  const qts = state.quickTasks || [];
  const active = qts.filter(t => !t.done);
  const done   = qts.filter(t => t.done);
  const totalMins = active.reduce((s,t) => s + (t.timeframeMinutes||15), 0);

  let items = '';
  for (const t of [...active, ...done]) {
    const deadlineStr = t.deadline ? `· ${formatDate(t.deadline)}` : '';
    const minsStr = (t.timeframeMinutes && t.timeframeMinutes !== 15) ? `${t.timeframeMinutes}m` : '';
    const meta = [minsStr, deadlineStr].filter(Boolean).join(' ');
    items += `<div class="quick-task-item">
      <div class="quick-task-check ${t.done?'done':''}" onclick="toggleQuickTask('${t.id}')">${t.done?'✓':''}</div>
      <div class="quick-task-name ${t.done?'done':''}" onclick="editQuickTask('${t.id}')">${t.name}</div>
      ${meta ? `<div class="quick-task-meta">${meta}</div>` : ''}
      <div class="quick-task-del" onclick="deleteQuickTask('${t.id}')" title="Remove">×</div>
    </div>`;
  }

  return `<div class="quick-panel">
    <div class="quick-panel-title">
      <span>Quick tasks</span>
      <span style="font-size:11px;color:var(--color-text-tertiary)">${(totalMins/60).toFixed(1)}h/wk</span>
    </div>
    <div class="quick-add-row">
      <input class="quick-add-input" id="qt-input" placeholder="Task name, press Enter…"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addQuickTask();}">
    </div>
    ${items || '<div style="font-size:12px;color:var(--color-text-tertiary);text-align:center;padding:8px 0">No quick tasks yet</div>'}
  </div>`;
}

function addQuickTask() {
  const inp = document.getElementById('qt-input');
  const name = inp.value.trim(); if (!name) return;
  if (!state.quickTasks) state.quickTasks = [];
  pushUndo();
  state.quickTasks.push({ id: uid(), name, done: false, deadline: '', timeframeMinutes: 15 });
  inp.value = '';
  save(); renderPlan();
  // Re-focus input after re-render
  setTimeout(() => { const el = document.getElementById('qt-input'); if (el) el.focus(); }, 30);
}

function toggleQuickTask(id) {
  if (!state.quickTasks) return;
  const t = state.quickTasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); renderPlan(); }
}

function deleteQuickTask(id) {
  if (!state.quickTasks) return;
  pushUndo();
  state.quickTasks = state.quickTasks.filter(t => t.id !== id);
  save(); renderPlan();
}

function editQuickTask(id) {
  if (!state.quickTasks) return;
  const t = state.quickTasks.find(t => t.id === id);
  if (!t) return;
  showModal(`<h2>Edit quick task</h2>
    <div class="form-field"><label>Name</label>
      <input id="qt-name" value="${t.name}" onkeydown="if(event.key==='Enter'){event.preventDefault();saveQuickTaskEdit('${id}');}"></div>
    <div class="form-field"><label>Deadline (optional)</label>
      <input id="qt-deadline" type="date" value="${t.deadline||''}"></div>
    <div class="form-field"><label>Time commitment (minutes/week)</label>
      <input id="qt-mins" type="number" min="1" step="5" value="${t.timeframeMinutes||15}"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveQuickTaskEdit('${id}')">Save</button>
    </div>`);
}

function saveQuickTaskEdit(id) {
  const t = state.quickTasks.find(t => t.id === id);
  if (!t) return;
  pushUndo();
  t.name = document.getElementById('qt-name').value.trim() || t.name;
  t.deadline = document.getElementById('qt-deadline').value;
  t.timeframeMinutes = parseInt(document.getElementById('qt-mins').value) || 15;
  closeModal(); save(); renderPlan();
}


// ── FORECAST VIEW ─────────────────────────────────────────────────────────
function renderForecast() {
  const weekAvail = state.weeklyHours;
  const WEEKS = 16;

  // Build allForPacking same as renderPlan
  const allForPacking = [];
  for (const cat of state.categories) {
    for (const t of (cat.tasks || [])) {
      if (t.status === 'done' || t.recurring) continue;
      allForPacking.push({ ...t, catName: cat.name, catColor: cat.color, catId: cat.id });
    }
  }
  allForPacking.sort((a, b) => {
    const da = a.dueDate ? daysUntil(a.dueDate) : 9999;
    const db = b.dueDate ? daysUntil(b.dueDate) : 9999;
    return da - db;
  });

  // Per-task per-week allocation: taskWeeks[w] = [{task, hours}]
  const taskWeeks = Array.from({length: WEEKS}, () => []);
  const buckets   = new Array(WEEKS).fill(0);

  for (const t of allForPacking) {
    let rem = remainingHours(t);
    if (rem <= 0) continue;
    const dueDays = t.dueDate ? daysUntil(t.dueDate) : (WEEKS - 1) * 7;
    const lastWeek = Math.min(Math.max(Math.floor(dueDays / 7), 0), WEEKS - 1);
    const alloc = {};
    for (let w = lastWeek; w >= 0 && rem > 0; w--) {
      const space = Math.max(weekAvail - buckets[w], 0);
      const take  = Math.min(rem, space);
      if (take > 0) { buckets[w] += take; alloc[w] = (alloc[w]||0) + take; rem -= take; }
    }
    // overflow spills into week 0
    if (rem > 0) { buckets[0] += rem; alloc[0] = (alloc[0]||0) + rem; }
    for (const [w, hrs] of Object.entries(alloc)) {
      taskWeeks[parseInt(w)].push({ task: t, hours: hrs });
    }
  }

  // Add quick task load
  for (const qt of (state.quickTasks || [])) {
    if (qt.done) continue;
    const weeklyH = (qt.timeframeMinutes || 15) / 60;
    for (let w = 0; w < WEEKS; w++) {
      if (qt.deadline) {
        const dueDays = daysUntil(qt.deadline);
        if (w * 7 > dueDays) continue;
      }
      taskWeeks[w].push({ task: { id: qt.id, name: qt.name, catColor: '#aaa', catName: 'Quick tasks', isQuick: true }, hours: weeklyH });
      buckets[w] += weeklyH;
    }
  }

  // Find last non-empty week (cap at WEEKS)
  let lastActiveWeek = 0;
  for (let w = 0; w < WEEKS; w++) { if (taskWeeks[w].length > 0) lastActiveWeek = w; }
  const showWeeks = Math.min(lastActiveWeek + 1, WEEKS);

  // Max load for bar scaling
  const maxLoad = Math.max(...buckets.slice(0, showWeeks), weekAvail, 1);

  // Collect categories for legend
  const catsSeen = {};
  for (const cat of state.categories) catsSeen[cat.id] = { name: cat.name, color: cat.color };

  // Week start date helper
  function weekStartDate(w) {
    const d = new Date(); d.setHours(0,0,0,0);
    d.setDate(d.getDate() - d.getDay()); // go to Sunday
    d.setDate(d.getDate() + w * 7);
    return d;
  }
  function shortDate(d) {
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  // Build deadline markers: for each task, mark which week its deadline falls in
  const deadlines = {}; // weekIdx -> [{task}]
  for (const t of allForPacking) {
    if (!t.dueDate) continue;
    const days = daysUntil(t.dueDate);
    if (days < 0 || days >= WEEKS * 7) continue;
    const w = Math.floor(days / 7);
    if (!deadlines[w]) deadlines[w] = [];
    deadlines[w].push(t);
  }

  if (showWeeks === 0) {
    document.getElementById('tab-forecast').innerHTML =
      `<div style="text-align:center;padding:3rem;font-size:13px;color:var(--color-text-secondary)">🎉 No upcoming workload to forecast!</div>`;
    return;
  }

  // Legend
  let legendHtml = '<div class="forecast-legend">';
  for (const cat of state.categories) {
    const hasWork = taskWeeks.some(wk => wk.some(a => a.task.catId === cat.id));
    if (!hasWork) continue;
    legendHtml += `<div class="forecast-legend-item"><div class="forecast-legend-dot" style="background:${cat.color}"></div>${cat.name}</div>`;
  }
  if ((state.quickTasks||[]).some(qt => !qt.done)) {
    legendHtml += `<div class="forecast-legend-item"><div class="forecast-legend-dot" style="background:#aaa"></div>Quick tasks</div>`;
  }
  legendHtml += '</div>';

  // Capacity indicator note
  const capNote = `<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:14px">
    Bars show greedy-scheduled hours per week. Vertical line = ${weekAvail}h capacity.
    <span style="color:var(--color-text-danger)">Red hatching = overcommitted.</span>
    ▼ = task deadline.
  </div>`;

  // Build rows
  let rowsHtml = '';
  for (let w = 0; w < showWeeks; w++) {
    const wStart = weekStartDate(w);
    const wEnd   = new Date(wStart); wEnd.setDate(wEnd.getDate() + 6);
    const label  = w === 0 ? 'This week' : w === 1 ? 'Next week' : shortDate(wStart);
    const load   = buckets[w];
    const overloaded = load > weekAvail + 0.05;
    const capFrac = weekAvail / maxLoad; // where capacity line sits as fraction of bar width

    // Sort segments by category for visual grouping
    const segs = [...taskWeeks[w]].sort((a,b) => (a.task.catColor||'').localeCompare(b.task.catColor||''));

    let barHtml = '';
    const normalLoad = Math.min(load, weekAvail);
    const overLoad   = Math.max(load - weekAvail, 0);
    const normalFrac = normalLoad / maxLoad;
    const overFrac   = overLoad   / maxLoad;

    // Stacked normal segments
    let runningFrac = 0;
    for (const seg of segs) {
      const segFrac = (Math.min(seg.hours, normalLoad - runningFrac * maxLoad / maxLoad)) / maxLoad;
      if (segFrac <= 0) break;
      const segPct = (seg.hours / maxLoad * 100).toFixed(1);
      const showLabel = seg.hours >= 0.5 && (seg.hours / maxLoad) > 0.06;
      const label = showLabel ? (seg.task.isQuick ? '⚡' : seg.task.name.slice(0,12) + (seg.task.name.length > 12 ? '…' : '')) : '';
      barHtml += `<div class="forecast-seg"
        style="width:${segPct}%;background:${seg.task.catColor};"
        onmouseenter="showForecastTip(event,'${seg.task.name.replace(/'/g,"\\'")} (${seg.hours.toFixed(1)}h) · ${seg.task.catName}')"
        onmouseleave="hideForecastTip()"
        title="${seg.task.name} — ${seg.hours.toFixed(1)}h">${label}</div>`;
      runningFrac += seg.hours / maxLoad;
    }

    // Overflow hatching
    if (overFrac > 0.001) {
      barHtml += `<div class="forecast-overflow" style="width:${(overFrac*100).toFixed(1)}%">+${overLoad.toFixed(1)}h</div>`;
    }

    // Capacity line
    barHtml += `<div class="forecast-cap-line" style="left:${(capFrac*100).toFixed(1)}%"></div>`;

    // Deadline pips below bar
    let pipsHtml = '';
    if (deadlines[w] && deadlines[w].length > 0) {
      pipsHtml = `<div style="position:relative;height:10px;margin-top:1px">`;
      for (const dt of deadlines[w]) {
        const dayInWeek = daysUntil(dt.dueDate) - w * 7; // 0-6
        const pipPos = ((dayInWeek / 6) * capFrac * 100).toFixed(1);
        pipsHtml += `<div class="forecast-deadline-pip" style="left:${pipPos}%;border-top-color:${dt.catColor}" title="Deadline: ${dt.name} (${formatDate(dt.dueDate)})"></div>`;
      }
      pipsHtml += `</div>`;
    }

    rowsHtml += `<div style="margin-bottom:${pipsHtml ? '14px':'5px'}">
      <div class="forecast-week-row">
        <div class="forecast-week-label ${overloaded?'overloaded':''}">
          <span>${label}</span>
          <span style="font-size:10px">${load.toFixed(1)}h${overloaded?' ⚠':''}</span>
        </div>
        <div class="forecast-bar-wrap">
          <div class="forecast-bar">${barHtml}</div>
          ${pipsHtml}
        </div>
      </div>
    </div>`;
  }

  document.getElementById('tab-forecast').innerHTML =
    `<div id="forecast-tooltip" class="forecast-tooltip"></div>
     <div style="font-size:15px;font-weight:500;margin-bottom:8px">Greedy forecast</div>
     ${capNote}${legendHtml}${rowsHtml}`;
}

function showForecastTip(e, text) {
  const tip = document.getElementById('forecast-tooltip');
  if (!tip) return;
  tip.textContent = text;
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top  = (e.clientY - 28) + 'px';
}
function hideForecastTip() {
  const tip = document.getElementById('forecast-tooltip');
  if (tip) tip.style.display = 'none';
}

// ── Boot ───────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
