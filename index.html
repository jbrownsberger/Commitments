    + '</div>'
    + '<div style="background:var(--color-background-secondary);border-radius:4px;height:8px;overflow:hidden">'
    + '<div style="height:100%;width:' + barWidth + '%;background:' + barColor + ';border-radius:4px;transition:width 0.4s"></div>'
    + '</div>'
    + overloadMsg
    + '</div>';

  // Suggested focus: use greedyPack week-0 allocations (respects planner schedule)
  const { taskWeeks: _tw } = greedyPack(52);
  const week0Allocs = {};
  for (const seg of (_tw[0] || [])) { if (!seg.task.isQuick) week0Allocs[seg.task.id] = (week0Allocs[seg.task.id]||0) + seg.hours; }

  let allocated = 0;
  const inBudget = [], overflow = [];
  for (const t of tasks) {
    const weeklyShare = week0Allocs[t.id] || 0;
    if (weeklyShare <= 0) continue; // not allocated this week at all
    if (allocated + weeklyShare <= weekAvail + 0.05) {
      inBudget.push({ t, weeklyShare });
      allocated += weeklyShare;
    } else {
      overflow.push({ t, weeklyShare });
    }
  }

  if (inBudget.length === 0 && overdue.length === 0) {
    html += `<div style="text-align:center;padding:2rem;font-size:13px;color:var(--color-text-secondary)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Nothing urgent this week!</div>`;
  }

  if (inBudget.length > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px">Suggested focus</div>`;
    for (const { t, weeklyShare } of inBudget) {
      const score = urgencyScore(t);
      const days  = daysUntil(t.dueDate);
      const daysStr = days === 0 ? 'Due today' : `${days}d left`;
      const [lvl] = urgencyLabel(score);
      const ck = t.status==='done'?'done':t.status==='in progress'?'in-progress':'';
      const cm = t.status==='done'?'✓':t.status==='in progress'?'●':'';
      html += `<div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:6px;cursor:pointer" onclick="openTaskPanel('${t.catId}','${t.id}')">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <div class="task-check ${ck}" style="cursor:pointer;flex-shrink:0" onclick="event.stopPropagation();cycleStatusById('${t.catId}','${t.id}')" title="Click to cycle status">${cm}</div>
          <div style="width:8px;height:8px;border-radius:50%;background:${t.catColor};flex-shrink:0"></div>
          <span style="font-size:13px;font-weight:500;flex:1">${t.name}</span>
          <span style="font-size:11px;color:var(--color-text-secondary)">${t.catName}</span>
          <span style="font-size:12px;font-weight:500;color:${urgencyColor(score)}">${score}</span>
        </div>
        ${(()=>{
          const nsArr = t.substeps || [];
          const nsIdx = nsArr.findIndex(s=>!s.done);
          if (nsIdx < 0) return '';
          const ns = nsArr[nsIdx];
          return `<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--color-text-secondary);margin-bottom:5px;padding-left:2px">
            <div class="substep-check ${ns.done?'done':''}" style="flex-shrink:0;cursor:pointer"
              onclick="event.stopPropagation();toggleSubstep('${t.catId}','${t.id}',${nsIdx});renderPlan();">${ns.done?'✓':''}</div>
            <span>Next: <em>${ns.text}</em></span>
          </div>`;
        })()}
        <div style="display:flex;align-items:center;gap:10px">
          <div class="urgency-track" style="flex:1"><div class="urgency-fill" style="width:${score}%;background:${urgencyColor(score)}"></div></div>
          <span class="plan-hours-badge">${weeklyShare.toFixed(1)}h this week</span>
          <span style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap">${daysStr}</span>
        </div>
      </div>`;
    }
  }

  if (overflow.length > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin:16px 0 8px">Later / lower priority</div>`;
    for (const { t } of overflow) {
      const score = urgencyScore(t);
      const days  = daysUntil(t.dueDate);
      const daysStr = days === 0 ? 'Due today' : `${days}d left`;
      const rem = remainingHours(t);
      const ck = t.status==='done'?'done':t.status==='in progress'?'in-progress':'';
      const cm = t.status==='done'?'✓':t.status==='in progress'?'●':'';
      const nsArr = t.substeps || [];
      const nsIdx = nsArr.findIndex(s=>!s.done);
      const nsHtml = nsIdx >= 0 ? (() => {
        const ns = nsArr[nsIdx];
        return `<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--color-text-secondary);margin-bottom:5px;padding-left:2px">
          <div class="substep-check ${ns.done?'done':''}" style="flex-shrink:0;cursor:pointer"
            onclick="event.stopPropagation();toggleSubstep('${t.catId}','${t.id}',${nsIdx});renderPlan();">${ns.done?'✓':''}</div>
          <span>Next: <em>${ns.text}</em></span>
        </div>`;
      })() : '';
      html += `<div class="plan-card" style="cursor:pointer" onclick="openTaskPanel('${t.catId}','${t.id}')">
        <div class="task-check ${ck}" style="cursor:pointer;flex-shrink:0" onclick="event.stopPropagation();cycleStatusById('${t.catId}','${t.id}')" title="Click to cycle status">${cm}</div>
        <div style="width:8px;height:8px;border-radius:50%;background:${t.catColor};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500">${t.name}</div>
          <div style="font-size:11px;color:var(--color-text-secondary)">${t.catName} · ${daysStr}${rem > 0 ? ' · ' + rem.toFixed(1) + 'h rem.' : ''}</div>
          ${nsHtml}
        </div>
        <span class="badge badge-${urgencyLabel(score)[0]}" style="flex-shrink:0">${score}</span>
      </div>`;
    }
  }

  // ── Full urgency queue (all tasks with no-date included) ──────────────
  const noDue = getAllIncompleteTasks().filter(t => !t.dueDate);
  if (noDue.length > 0) {
    html += `<div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin:16px 0 8px">No due date</div>`;
    for (const t of noDue) {
      const rem = remainingHours(t);
      const ck = t.status==='done'?'done':t.status==='in progress'?'in-progress':'';
      const cm = t.status==='done'?'✓':t.status==='in progress'?'●':'';
      html += `<div class="plan-card" style="cursor:pointer" onclick="openTaskPanel('${t.catId}','${t.id}')">
        <div class="task-check ${ck}" style="cursor:pointer;flex-shrink:0" onclick="event.stopPropagation();cycleStatusById('${t.catId}','${t.id}')">${cm}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500">${t.name}</div>
          <div style="font-size:11px;color:var(--color-text-secondary)">${t.catName}${rem > 0 ? ' · ' + rem.toFixed(1) + 'h rem.' : ''}</div>
        </div>

  if (!state.quickTasks) state.quickTasks = [];
  document.getElementById('tab-plan').innerHTML =
    `<div class="plan-layout"><div>${html}</div><div style="display:flex;flex-direction:column;gap:12px;">${renderQuickPanel()}${renderTodayPanel()}</div></div>`;
}

// ── DRAG TO REORDER ────────────────────────────────────────────────────
let _dragCatId = null, _dragTaskId = null, _dragOverTaskId = null;

function onDragStart(e, catId, taskId) {
  _dragCatId   = catId;
  _dragTaskId  = taskId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.getElementById('task-' + taskId);
    if (el) el.classList.add('dragging');
  }, 0);
}

function onDragOver(e, taskId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (taskId === _dragOverTaskId) return;
  // Clear previous
  document.querySelectorAll('.task-item.drag-over').forEach(el => el.classList.remove('drag-over'));
  _dragOverTaskId = taskId;
  const el = document.getElementById('task-' + taskId);
  if (el) el.classList.add('drag-over');
}

function onDragEnd() {
  document.querySelectorAll('.task-item').forEach(el => {
    el.classList.remove('dragging');
    el.classList.remove('drag-over');
  });
}

function onDrop(e, catId, taskId) {
  e.preventDefault();
  onDragEnd();
  if (!_dragTaskId || _dragTaskId === taskId || _dragCatId !== catId) return;
  const cat   = state.categories.find(c => c.id === catId);
  const tasks = cat.tasks;
  const fromIdx = tasks.findIndex(t => t.id === _dragTaskId);
  const toIdx   = tasks.findIndex(t => t.id === taskId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = tasks.splice(fromIdx, 1);
  tasks.splice(toIdx, 0, moved);
  _dragTaskId = null; _dragOverTaskId = null;
  render();
}

function saveTaskGlobal() {
  pushUndo();

// ── QUICK TASKS (Change 2) ────────────────────────────────────────────────
function renderTodayPanel() {
  const _td = new Date(); const todayISO = _td.getFullYear()+'-'+String(_td.getMonth()+1).padStart(2,'0')+'-'+String(_td.getDate()).padStart(2,'0');
  const todayTasks = [];
  for (const cat of state.categories) {
    for (const t of (cat.tasks||[])) {
      if (t.status === 'done') continue;
      if (t.scheduledDays && t.scheduledDays.includes(todayISO)) {
        todayTasks.push({...t, catColor: cat.color, catId: cat.id});
      }
    }
  }

  if (todayTasks.length === 0) return `<div class="quick-panel">
    <div class="quick-panel-title"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;opacity:0.7"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Today's plan</div>
    <div style="font-size:12px;color:var(--color-text-secondary);padding:8px 0">
      Nothing scheduled for today.<br>
      <span style="cursor:pointer;color:var(--color-text-info);"
        onclick="switchTab('calendar', document.querySelector('.tab:last-child'))">Open Planner →</span>
    </div>
  </div>`;

  const totalHrs = todayTasks.reduce((s, t) => {
    const rem = remainingHours(t);
    const fut = (t.scheduledDays||[]).filter(d => d >= todayISO);
    return s + (fut.length > 0 ? rem / fut.length : 0);
  }, 0);

  const items = todayTasks.map(t => {
    const rem  = remainingHours(t);
    const fut  = (t.scheduledDays||[]).filter(d => d >= todayISO);
    const hrs  = fut.length > 0 ? (rem / fut.length).toFixed(1) : '?';
    const ck   = t.status === 'done' ? 'done' : t.status === 'in progress' ? 'in-progress' : '';
    const cm   = t.status === 'done' ? '✓' : t.status === 'in progress' ? '●' : '';
    return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;
        border-bottom:1px solid var(--color-border);cursor:pointer;"
        onclick="openTaskPanel('${t.catId}','${t.id}')">
      <div style="width:8px;height:8px;border-radius:50%;background:${t.catColor};flex-shrink:0"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.name}</div>
        <div style="font-size:10px;color:var(--color-text-secondary);">${hrs}h planned today</div>
      </div>
      <div class="task-check ${ck}" style="cursor:pointer;flex-shrink:0"
        onclick="event.stopPropagation();cycleStatusById('${t.catId}','${t.id}')">${cm}</div>
    </div>`;
  }).join('');

  return `<div class="quick-panel">
    <div class="quick-panel-title"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;opacity:0.7"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Today's plan
      <span style="font-size:11px;font-weight:400;color:var(--color-text-secondary);margin-left:6px">${totalHrs.toFixed(1)}h</span>
    </div>
    ${items}
  </div>`;
}

function renderQuickPanel() {
  const qts = state.quickTasks || [];
  const active = qts.filter(t => !t.done);
  const done   = qts.filter(t => t.done);
  const totalMins = active.reduce((s,t) => s + (t.timeframeMinutes||15), 0);

  let items = '';
  for (const t of [...active, ...done]) {
    const deadlineStr = t.deadline ? `· ${formatDate(t.deadline)}` : '';
    const minsStr = (t.timeframeMinutes && t.timeframeMinutes !== 15) ? `${t.timeframeMinutes}m` : '';
    const meta = [minsStr, deadlineStr].filter(Boolean).join(' ');
    items += `<div class="quick-task-item">
      <div class="quick-task-check ${t.done?'done':''}" onclick="toggleQuickTask('${t.id}')">${t.done?'✓':''}</div>
      <div class="quick-task-name ${t.done?'done':''}" onclick="editQuickTask('${t.id}')">${t.name}</div>
      ${meta ? `<div class="quick-task-meta">${meta}</div>` : ''}
      <div class="quick-task-del" onclick="deleteQuickTask('${t.id}')" title="Remove">×</div>
    </div>`;
  }

  return `<div class="quick-panel">
    <div class="quick-panel-title">
      <span>Quick tasks</span>
      <span style="font-size:11px;color:var(--color-text-tertiary)">${(totalMins/60).toFixed(1)}h/wk</span>
    </div>
    <div class="quick-add-row">
      <input class="quick-add-input" id="qt-input" placeholder="Task name, press Enter…"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addQuickTask();}">
    </div>
    ${items || '<div style="font-size:12px;color:var(--color-text-tertiary);text-align:center;padding:8px 0">No quick tasks yet</div>'}
  </div>`;
}

function addQuickTask() {
  const inp = document.getElementById('qt-input');
  const name = inp.value.trim(); if (!name) return;
  if (!state.quickTasks) state.quickTasks = [];
  pushUndo();
  state.quickTasks.push({ id: uid(), name, done: false, deadline: '', timeframeMinutes: 15 });
  inp.value = '';
  save(); renderPlan();
  // Re-focus input after re-render
  setTimeout(() => { const el = document.getElementById('qt-input'); if (el) el.focus(); }, 30);
}

function toggleQuickTask(id) {
  if (!state.quickTasks) return;
  const t = state.quickTasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); renderPlan(); }
}

function deleteQuickTask(id) {
  if (!state.quickTasks) return;
  pushUndo();
  state.quickTasks = state.quickTasks.filter(t => t.id !== id);
  save(); renderPlan();
}

function editQuickTask(id) {
  if (!state.quickTasks) return;
  const t = state.quickTasks.find(t => t.id === id);
  if (!t) return;
  showModal(`<h2>Edit quick task</h2>
    <div class="form-field"><label>Name</label>
      <input id="qt-name" value="${t.name}" onkeydown="if(event.key==='Enter'){event.preventDefault();saveQuickTaskEdit('${id}');}"></div>
    <div class="form-field"><label>Deadline (optional)</label>
      <input id="qt-deadline" type="date" value="${t.deadline||''}"></div>
    <div class="form-field"><label>Time commitment (minutes/week)</label>
      <input id="qt-mins" type="number" min="1" step="5" value="${t.timeframeMinutes||15}"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveQuickTaskEdit('${id}')">Save</button>
    </div>`);
}

function saveQuickTaskEdit(id) {
  const t = state.quickTasks.find(t => t.id === id);
  if (!t) return;
  pushUndo();
  t.name = document.getElementById('qt-name').value.trim() || t.name;
  t.deadline = document.getElementById('qt-deadline').value;
  t.timeframeMinutes = parseInt(document.getElementById('qt-mins').value) || 15;
  closeModal(); save(); renderPlan();
}


// ── FORECAST VIEW ─────────────────────────────────────────────────────────
function renderForecast() {
  const weekAvail = state.weeklyHours;
  const WEEKS     = 16;
  const { weekLoads, taskWeeks, deadlines } = greedyPack(WEEKS);

  let lastActiveWeek = 0;
  for (let w = 0; w < WEEKS; w++) { if (weekLoads[w] > 0.001) lastActiveWeek = w; }
  const showWeeks = Math.min(lastActiveWeek + 1, WEEKS);

  if (showWeeks === 0) {
    document.getElementById('tab-forecast').innerHTML =
      `<div style="text-align:center;padding:3rem;font-size:13px;color:var(--color-text-secondary)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> No upcoming workload to forecast!</div>`;
    return;
  }

  const maxLoad = Math.max(...Array.from({length: showWeeks}, (_,w) => weekLoads[w]), weekAvail * 1.2, 1);

  function weekLabel(w) {
    const start = new Date(); start.setHours(0,0,0,0); start.setDate(start.getDate() + w * 7);
    const end   = new Date(start); end.setDate(end.getDate() + 6);
    const fmt   = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return w === 0
      ? `This week (${fmt(start)}–${fmt(end).replace(/[A-Za-z]+ /,'')})`
      : `${fmt(start)}–${fmt(end).replace(/[A-Za-z]+ /,'')}`;
  }

  // Legend
  let legendHtml = '<div class="forecast-legend">';
  for (const cat of state.categories) {
    const hasWork = taskWeeks.slice(0, showWeeks).some(wk => wk.some(a => a.task.catId === cat.id));
    if (!hasWork) continue;
    legendHtml += `<div class="forecast-legend-item"><div class="forecast-legend-dot" style="background:${cat.color}"></div>${cat.name}</div>`;
  }
  if ((state.quickTasks||[]).some(qt => !qt.done)) {
    legendHtml += `<div class="forecast-legend-item"><div class="forecast-legend-dot" style="background:#999"></div>Quick tasks</div>`;
  }
  legendHtml += `<div class="forecast-legend-item"><div style="width:10px;height:10px;border-left:2px solid #333;opacity:0.3;flex-shrink:0"></div>${weekAvail}h limit</div>`;
  legendHtml += '</div>';

  // Pick-mode banner
  const pickBanner = _pickedTask
    ? `<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;
         background:var(--color-background-info);color:var(--color-text-info);
         border:1px solid var(--color-border-info);border-radius:6px;padding:7px 12px;margin-bottom:10px">
        <span><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Moving <strong>${_pickedTask.name}</strong> — click <strong>Place here</strong> on the target week</span>
        <button class="btn btn-sm" onclick="cancelForecastPick()" style="margin-left:16px">✕ Cancel</button>
       </div>`
    : `<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px">
        Hover a segment and click <strong>↕</strong> to reschedule it to a different week.
       </div>`;

  let rowsHtml = '';
  for (let w = 0; w < showWeeks; w++) {
    const load       = weekLoads[w];
    const overloaded = load > weekAvail + 0.05;
    const capLinePct = (weekAvail / maxLoad * 100).toFixed(1);
    const segs       = [...taskWeeks[w]].sort((a,b) => (a.task.catColor||'').localeCompare(b.task.catColor||''));

    // Build bar segments
    let barHtml = '';
    for (const seg of segs) {
      const segPct  = (seg.hours / maxLoad * 100).toFixed(2);
      const showLbl = (seg.hours / maxLoad) > 0.07;
      const lbl     = showLbl ? (seg.task.isQuick ? '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>' : seg.task.name.slice(0,14) + (seg.task.name.length > 14 ? '…' : '')) : '';
      const sn      = seg.task.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const isPicked = _pickedTask && _pickedTask.taskId === seg.task.id;

      if (seg.task.isQuick) {
        barHtml += `<div class="forecast-seg"
          style="width:${segPct}%;background:${seg.task.catColor};cursor:pointer;"
          onmouseenter="showForecastTip(event,'${sn} — ${seg.hours.toFixed(1)}h')"
          onmouseleave="hideForecastTip()"
          onclick="editQuickTask('${seg.task.id}')">${lbl}</div>`;
      } else if (_pickedTask) {
        // Pick mode: segments are inert, just visual
        barHtml += `<div class="forecast-seg${isPicked ? ' picked' : ''}"
          style="width:${segPct}%;background:${seg.task.catColor};cursor:default;opacity:${isPicked?'1':'0.5'};"
          onmouseenter="showForecastTip(event,'${sn} — ${seg.hours.toFixed(1)}h')"
          onmouseleave="hideForecastTip()">${lbl}</div>`;
      } else {
        // Normal mode: click=open, ↕ button=pick
        barHtml += `<div class="forecast-seg"
          style="width:${segPct}%;background:${seg.task.catColor};cursor:pointer;position:relative;"
          onmouseenter="showForecastTip(event,'${sn} — ${seg.hours.toFixed(1)}h · click to open, ↕ to move')"
          onmouseleave="hideForecastTip()"
          onclick="openTaskPanel('${seg.task.catId}','${seg.task.id}')">
          ${lbl}<span class="seg-move-btn"
            onclick="event.stopPropagation();pickForecastTask('${seg.task.catId}','${seg.task.id}','${sn}','${seg.task.catColor}')"
            title="Move to a different week">↕</span></div>`;
      }
    }
    barHtml += `<div class="forecast-cap-line" style="left:${capLinePct}%"></div>`;

    // Pin badges
    let pinBadges = '';
    for (const seg of taskWeeks[w]) {
      if (seg.task.scheduleWeekPin) {
        const pd = new Date(seg.task.scheduleWeekPin + 'T00:00:00')
          .toLocaleDateString('en-US',{month:'short',day:'numeric'});
        const sn2 = seg.task.name.replace(/'/g,"\\'");
        pinBadges += `<span class="forecast-pin-badge"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${seg.task.name.slice(0,12)}${seg.task.name.length>12?'…':''}
          <span class="forecast-pin-clear" onclick="clearSchedulePin('${seg.task.catId}','${seg.task.id}')">×</span></span> `;
      }
    }

    // "Place here" button shown only in pick mode
    const placeBtn = _pickedTask
      ? `<button class="btn btn-sm" style="font-size:10px;padding:2px 8px;margin-top:4px;display:block;"
           onclick="dropForecastTask(${w})">Place here</button>`
      : '';

    // Deadline column
    let deadlineCol = '';
    if (deadlines[w] && deadlines[w].length > 0) {
      deadlineCol = deadlines[w].map(dt => {
        const days = daysUntil(dt.dueDate);
        const ds   = days === 0 ? 'today' : days === 1 ? 'tomorrow'
          : new Date(dt.dueDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
        return `<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">
          <div style="width:7px;height:7px;border-radius:50%;background:${dt.catColor};flex-shrink:0"></div>
          <span style="font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px" title="${dt.name}">${dt.name}</span>
          <span style="font-size:10px;color:var(--color-text-secondary);white-space:nowrap">${ds}</span>
        </div>`;
      }).join('');
    }

    rowsHtml += `<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;
        padding:3px 4px;border-radius:6px;${_pickedTask?'outline:1px dashed var(--color-border-info);':''}">
      <div class="forecast-week-label ${overloaded?'overloaded':''}">
        <span>${weekLabel(w)}</span>
        <span style="font-size:10px;${overloaded?'color:var(--color-text-danger)':''}">${load.toFixed(1)}h${overloaded?' <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>':''}</span>
        ${placeBtn}
      </div>
      <div style="flex:1;min-width:0">
        <div class="forecast-bar-wrap"><div class="forecast-bar">${barHtml}</div></div>
        ${pinBadges ? `<div style="margin-top:3px">${pinBadges}</div>` : ''}
      </div>
      <div style="width:200px;flex-shrink:0;padding-top:4px">${deadlineCol}</div>
    </div>`;
  }

  document.getElementById('tab-forecast').innerHTML =
    `<div id="forecast-tooltip" class="forecast-tooltip"></div>
     <div style="font-size:15px;font-weight:500;margin-bottom:8px">Greedy forecast</div>
     ${pickBanner}${legendHtml}
     <div style="display:flex;gap:10px;margin-bottom:4px">
       <div style="width:90px;flex-shrink:0"></div>
       <div style="flex:1;font-size:10px;color:var(--color-text-tertiary)">hours →</div>
       <div style="width:200px;flex-shrink:0;font-size:10px;color:var(--color-text-tertiary)">deadlines this week</div>
     </div>
     ${rowsHtml}`;
}

function showForecastTip(e, text) {
  const tip = document.getElementById('forecast-tooltip');
  if (!tip) return;
  tip.textContent = text;
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top  = (e.clientY - 28) + 'px';
}
function hideForecastTip() {
  const tip = document.getElementById('forecast-tooltip');
  if (tip) tip.style.display = 'none';
}

// ── Notes link renderer ───────────────────────────────────────────────────
function renderNotes(text) {
  if (!text) return '';
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return escaped.replace(
    /(https?:\/\/[^\s<>"]+)/g,
    '<a href="$1" target="_blank" rel="noopener" style="color:var(--color-text-info);word-break:break-all;">$1</a>'
  );
}


// ── FORECAST SCHEDULE PINNING ──────────────────────────────────────────────
let _plannerWeekOffset = 0;
let _plannerForecastOpen = true; // weeks from today
let _pickedTask = null; // { catId, taskId, name, color } or null

function pickForecastTask(catId, taskId, name, color, segEl) {
  if (_pickedTask && _pickedTask.taskId === taskId) {
    _pickedTask = null;
  } else {
    _pickedTask = { catId, taskId, name, color };
  }
  renderForecast(); // re-render so banner, highlights, and drop targets all update
}

function forecastRowClick(weekIndex) {
  if (!_pickedTask) return; // nothing picked, ignore
  dropForecastTask(weekIndex);
}

function dropForecastTask(weekIndex) {
  if (!_pickedTask) return;
  const { catId, taskId } = _pickedTask;
  // Monday of the target week
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate() + weekIndex * 7);
  const newPin = d.toISOString().slice(0, 10);

  // Warn if pin week starts after deadline
  let dueDate = null;
  for (const cat of state.categories) {
    const t = cat.tasks.find(t => t.id === taskId);
    if (t) { dueDate = t.dueDate; break; }
  }
  if (dueDate && newPin > dueDate) {
    if (!confirm(`"${_pickedTask.name}" is due ${dueDate}. That week starts after the deadline — the task will overflow. Continue?`)) {
      _pickedTask = null; renderForecast(); return;
    }
  }

  pushUndo();
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat && cat.tasks.find(t => t.id === taskId);
  if (task) {
    task.scheduleWeekPin = newPin;
    delete task.scheduleNotBefore;
  }
  _pickedTask = null;
  render();
}

function clearSchedulePin(catId, taskId) {
  pushUndo();
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat && cat.tasks.find(t => t.id === taskId);
  if (!task) return;
  delete task.scheduleWeekPin;
  delete task.scheduleNotBefore;
  render();
}

function cancelForecastPick() {
  _pickedTask = null;
  renderForecast();
}


// ── WEEK PLANNER ───────────────────────────────────────────────────────────
function renderPlanner() {
  const weekAvail  = state.weeklyHours;
  const dayAvail   = weekAvail / 7;
  const SHOW_WEEKS = 4;

  const today = new Date(); today.setHours(0,0,0,0);
  function toISO(d) { return d.toISOString().slice(0,10); }
  const todayISO = toISO(today);

  const anchor = new Date(today);
  const dow = anchor.getDay();
  anchor.setDate(anchor.getDate() + (dow === 0 ? -6 : 1 - dow) + _plannerWeekOffset * 7);

  const allDays = Array.from({length: SHOW_WEEKS * 7}, (_, i) => {
    const d = new Date(anchor); d.setDate(d.getDate() + i); return d;
  });
  const allISOs  = allDays.map(toISO);
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Only non-done tasks
  const allTasks = [];
  for (const cat of state.categories) {
    for (const t of (cat.tasks||[])) {
      if (t.status === 'done') continue;
      allTasks.push({...t, catName: cat.name, catColor: cat.color, catId: cat.id});
    }
  }

  const dayLoad        = {};
  const scheduledOnDay = {};
  const dueOnDay       = {};
  allISOs.forEach(iso => { dayLoad[iso] = 0; scheduledOnDay[iso] = []; dueOnDay[iso] = []; });

  for (const t of allTasks) {
    if (t.dueDate && dueOnDay[t.dueDate] !== undefined) dueOnDay[t.dueDate].push(t);
    if (!t.scheduledDays || t.scheduledDays.length === 0) continue;
    const rem        = remainingHours(t);
    if (rem <= 0) continue;
    const futureDays = t.scheduledDays.filter(d => d >= todayISO);
    if (!futureDays.length) continue;
    const dayHours   = t.scheduledDayHours || {};
    const explicitTotal = futureDays.reduce((s, d) => s + (dayHours[d] || 0), 0);
    const unweighted    = futureDays.filter(d => !dayHours[d]);
    const perUnweighted = unweighted.length > 0 ? Math.max(rem - explicitTotal, 0) / unweighted.length : 0;
    for (const d of futureDays) {
      const hrs = dayHours[d] || perUnweighted;
      if (dayLoad[d]        !== undefined) dayLoad[d]        += hrs;
      if (scheduledOnDay[d] !== undefined) scheduledOnDay[d].push(t);
    }
  }

  function fmtDate(iso) {
    return new Date(iso+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  function dayCard(t, iso) {
    const rem        = remainingHours(t);
    const futureDays = (t.scheduledDays||[]).filter(d => d >= todayISO);
    const dayHours   = t.scheduledDayHours || {};
    const explicitTotal = futureDays.reduce((s, d) => s + (dayHours[d] || 0), 0);
    const unweighted    = futureDays.filter(d => !dayHours[d]);
    const perUnweighted = unweighted.length > 0 ? Math.max(rem - explicitTotal, 0) / unweighted.length : 0;
    const hrsDay        = dayHours[iso] !== undefined ? dayHours[iso] : perUnweighted;
    const isCustom      = dayHours[iso] !== undefined;
    const due           = t.dueDate ? ` · due ${fmtDate(t.dueDate)}` : '';
    const popoverId     = `hp-${t.id}-${iso}`;
    return `<div class="planner-task-card" style="background:${t.catColor};"
        draggable="true"
        ondragstart="plannerDragStart(event,'${t.catId}','${t.id}')"
        ondragend="plannerDragEnd(event)"
        onclick="openTaskPanel('${t.catId}','${t.id}')"
        title="Click to open · drag to move">
      <div class="card-info">
        <div class="card-name">${t.name.slice(0,20)}${t.name.length>20?'…':''}</div>
        <div class="card-meta" style="display:flex;align-items:center;gap:4px;">
          <span class="hrs-badge${isCustom?' hrs-custom':''}"
            onclick="event.stopPropagation();toggleHrsPopover('${popoverId}','${t.catId}','${t.id}','${iso}',${hrsDay.toFixed(1)})"
            title="Click to adjust hours">${hrsDay.toFixed(1)}h</span>
          ${due ? `<span style="opacity:0.85">${due}</span>` : ''}
        </div>
        <div id="${popoverId}" class="hrs-popover" style="display:none" onclick="event.stopPropagation()">
          <div style="font-size:10px;margin-bottom:4px;opacity:0.85">Hours on this day</div>
          <div style="display:flex;align-items:center;gap:6px;">
            <input id="${popoverId}-inp" type="number" min="0" step="0.5" value="${hrsDay.toFixed(1)}"
              style="width:54px;font-size:13px;padding:3px 6px;border-radius:4px;
                border:1px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.15);
                color:inherit;text-align:center;"
              onkeydown="if(event.key==='Enter'){plannerSetDayHours('${t.catId}','${t.id}','${iso}',+this.value);}"
            />
            <button style="font-size:11px;padding:3px 8px;border-radius:4px;border:none;
              background:rgba(255,255,255,0.25);color:inherit;cursor:pointer;"
              onclick="plannerSetDayHours('${t.catId}','${t.id}','${iso}',+document.getElementById('${popoverId}-inp').value)">Set</button>
            ${isCustom ? `<button style="font-size:11px;padding:3px 6px;border-radius:4px;border:none;
              background:rgba(255,255,255,0.15);color:inherit;cursor:pointer;opacity:0.8;"
              onclick="plannerClearDayHours('${t.catId}','${t.id}','${iso}')" title="Reset to auto">↺</button>` : ''}
          </div>
        </div>
      </div>
      <span class="card-clear" onclick="event.stopPropagation();plannerRemoveDay('${t.catId}','${t.id}','${iso}')">×</span>
    </div>`;
  }
  function sidebarCard(t) {
    const rem       = remainingHours(t);
    const due       = t.dueDate ? `due ${fmtDate(t.dueDate)}` : 'no deadline';
    const scheduled = (t.scheduledDays||[]).filter(d => allISOs.includes(d));
    const badges    = scheduled.map(d =>
      `<span style="font-size:9px;padding:1px 4px;border-radius:3px;
         background:rgba(255,255,255,0.3);margin:1px;cursor:pointer;"
         onclick="event.stopPropagation();plannerRemoveDay('${t.catId}','${t.id}','${d}')">${fmtDate(d)} ×</span>`
    ).join('');
    return `<div class="planner-task-card" style="background:${t.catColor};"
        draggable="true"
        ondragstart="plannerDragStart(event,'${t.catId}','${t.id}')"
        ondragend="plannerDragEnd(event)"
        onclick="openTaskPanel('${t.catId}','${t.id}')"
        title="Click to open · drag to schedule">
      <div class="card-info">
        <div class="card-name">${t.name.slice(0,20)}${t.name.length>20?'…':''}</div>
        <div class="card-meta">${rem.toFixed(1)}h · ${due}</div>
        ${badges ? `<div style="margin-top:3px;display:flex;flex-wrap:wrap;gap:1px">${badges}</div>` : ''}
      </div>
    </div>`;
  }

  // ── Forecast bar section (collapsible) ──────────────────────────────────
  // Use rolling weeks: week 0 = today..today+6, week 1 = today+7..today+13, etc.
  // greedyPack already uses rolling weeks from today, so weekLoads[w] matches directly.
  const ROLLING_WEEKS = SHOW_WEEKS + _plannerWeekOffset;
  const { weekLoads }  = greedyPack(Math.max(ROLLING_WEEKS + 1, SHOW_WEEKS + 1));
  const visLoads       = Array.from({length: SHOW_WEEKS}, (_, w) => weekLoads[w + _plannerWeekOffset] || 0);
  const maxLoad        = Math.max(...visLoads, weekAvail * 1.2, 1);
  let forecastBarsHtml = '';
  for (let w = 0; w < SHOW_WEEKS; w++) {
    const load    = visLoads[w];
    const over    = load > weekAvail + 0.05;
    const capPct  = (weekAvail / maxLoad * 100).toFixed(1);
    const barPct  = Math.min(load / maxLoad * 100, 130).toFixed(1);
    // Rolling week label: today + (w + _plannerWeekOffset)*7 .. +6
    const wStart = new Date(today); wStart.setDate(wStart.getDate() + (w + _plannerWeekOffset) * 7);
    const wEnd   = new Date(wStart); wEnd.setDate(wEnd.getDate() + 6);
    const fmt    = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const ws     = (w + _plannerWeekOffset) === 0
      ? `This wk`
      : fmt(wStart);
    forecastBarsHtml += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
      <div style="width:72px;font-size:10px;color:var(--color-text-secondary);flex-shrink:0" title="${fmt(wStart)}–${fmt(wEnd)}">${ws}</div>
      <div style="flex:1;height:12px;background:var(--color-background-secondary);border-radius:3px;position:relative;">
        <div style="height:100%;width:${barPct}%;background:${over?'var(--color-text-danger)':'var(--color-text-info)'};border-radius:3px;opacity:0.7;"></div>
        <div style="position:absolute;top:0;bottom:0;left:${capPct}%;width:1.5px;background:rgba(0,0,0,0.25);"></div>
      </div>
      <div style="width:36px;font-size:10px;text-align:right;flex-shrink:0;${over?'color:var(--color-text-danger);font-weight:600':'color:var(--color-text-secondary)'}">
        ${load.toFixed(1)}h${over?' <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>':''}
      </div>
    </div>`;
  }
  const forecastSection = `<div style="margin-bottom:12px;border:1px solid var(--color-border);border-radius:6px;overflow:hidden;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;
        background:var(--color-background-secondary);cursor:pointer;"
        onclick="_plannerForecastOpen=!_plannerForecastOpen;renderPlanner()">
      <span style="font-size:12px;font-weight:600"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;opacity:0.7"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg> Workload forecast</span>
      <span style="font-size:11px;color:var(--color-text-secondary)">${_plannerForecastOpen?'▲ hide':'▼ show'}</span>
    </div>
    ${_plannerForecastOpen ? `<div style="padding:8px 10px">${forecastBarsHtml}</div>` : ''}
  </div>`;

  // ── Sidebar ──────────────────────────────────────────────────────────────
  const allSorted = [...allTasks].sort((a,b) => (a.dueDate||'9999') < (b.dueDate||'9999') ? -1 : 1);
  const sidebarHtml = `
    <div class="planner-sidebar-label">All tasks (${allTasks.length})</div>
    <div style="display:flex;gap:4px;margin-bottom:6px;">
      <button class="btn btn-sm" style="flex:1;" onclick="plannerAutoFill()"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Auto-fill</button>
      <button class="btn btn-sm" style="flex:1;" onclick="plannerClearAll()"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg> Clear all</button>
    </div>
    <div id="planner-sidebar" style="max-height:70vh;overflow-y:auto;"
      ondragover="event.preventDefault()" ondrop="plannerDropSidebar(event)">
      ${allSorted.length === 0
        ? `<div style="font-size:11px;color:var(--color-text-secondary);padding:8px 0">No tasks</div>`
        : allSorted.map(t => sidebarCard(t)).join('')}
    </div>`;

  // ── Week rows ─────────────────────────────────────────────────────────────
  let weeksHtml = '';
  for (let w = 0; w < SHOW_WEEKS; w++) {
    let dayColsHtml = '';
    for (let i = 0; i < 7; i++) {
      const iso     = allISOs[w * 7 + i];
      const load    = dayLoad[iso] || 0;
      const over    = load > dayAvail + 0.05;
      const isToday = iso === todayISO;
      const isPast  = iso < todayISO;
      const tasksHtml = scheduledOnDay[iso].map(t => dayCard(t, iso)).join('');
      const dueBadges = dueOnDay[iso].map(t =>
        `<div style="font-size:9px;padding:2px 5px;border-radius:8px;margin-top:2px;
           background:${t.catColor};color:#fff;cursor:pointer;
           white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
           onclick="openTaskPanel('${t.catId}','${t.id}')"
           title="Due: ${t.name}"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;opacity:0.7"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${t.name.slice(0,12)}${t.name.length>12?'…':''}</div>`
      ).join('');
      dayColsHtml += `<div>
        <div class="planner-day-header${isToday?' today':''}${isPast?' past':''}">
          ${dayNames[i]}<br>
          <span style="font-weight:400">${fmtDate(iso)}</span>
        </div>
        <div class="planner-col${isPast?' past':''}" id="planner-col-${iso}"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="plannerDrop(event,'${iso}')">
          ${tasksHtml}
          ${dueBadges}
        </div>
        <div class="planner-day-load${over?' over':''}">
          ${load > 0.05 ? load.toFixed(1)+'h' : ''}${over?' <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>':''}
        </div>
      </div>`;
    }
    const ws = allDays[w*7].toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const we = allDays[w*7+6].toLocaleDateString('en-US',{month:'short',day:'numeric'});
    weeksHtml += `<div style="margin-bottom:14px;">
      <div style="font-size:11px;font-weight:600;color:var(--color-text-secondary);margin-bottom:4px;">${ws} – ${we}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;">${dayColsHtml}</div>
    </div>`;
  }

  const wTitle = `${allDays[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${allDays[allDays.length-1].toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
  const navHtml = `<div class="planner-nav">
    <button class="btn btn-sm" onclick="plannerNav(-1)">← Earlier</button>
    <span class="planner-week-title">${wTitle}</span>
    <button class="btn btn-sm" onclick="plannerNav(1)">Later →</button>
    ${_plannerWeekOffset !== 0 ? `<button class="btn btn-sm" onclick="plannerNav(0,true)">Today</button>` : ''}
  </div>`;

  document.getElementById('tab-calendar').innerHTML = `
    ${navHtml}
    ${forecastSection}
    <div style="display:grid;grid-template-columns:170px 1fr;gap:12px;align-items:start;">
      <div class="planner-sidebar">${sidebarHtml}</div>
      <div>${weeksHtml}</div>
    </div>`;
}

function plannerNav(dir, reset) {
  _plannerWeekOffset = reset ? 0 : _plannerWeekOffset + dir;
  renderPlanner();
}

// Drag state
let _dragging = null;

function plannerDragStart(e, catId, taskId) {
  _dragging = {catId, taskId};
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', taskId);
}
function plannerDragEnd(e) {
  document.querySelectorAll('.planner-col').forEach(el => el.classList.remove('drag-over'));
}

function plannerDrop(e, iso) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!_dragging) return;
  plannerAddDay(_dragging.catId, _dragging.taskId, iso);
  _dragging = null;
}

function plannerDropSidebar(e) {
  e.preventDefault();
  if (!_dragging) return;
  const {catId, taskId} = _dragging;
  pushUndo();
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat && cat.tasks.find(t => t.id === taskId);
  if (task) task.scheduledDays = [];
  _dragging = null;
  render();
}

function plannerAddDay(catId, taskId, iso) {
  pushUndo();
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat && cat.tasks.find(t => t.id === taskId);
  if (!task) return;
  if (!task.scheduledDays) task.scheduledDays = [];
  if (!task.scheduledDays.includes(iso)) task.scheduledDays.push(iso);
  render();
}

function plannerRemoveDay(catId, taskId, iso) {
  pushUndo();
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat && cat.tasks.find(t => t.id === taskId);
  if (!task || !task.scheduledDays) return;
  task.scheduledDays = task.scheduledDays.filter(d => d !== iso);
  if (task.scheduledDayHours) delete task.scheduledDayHours[iso];
  render();
}

function plannerSetDayHours(catId, taskId, iso, hrs) {
  pushUndo();
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat && cat.tasks.find(t => t.id === taskId);
  if (!task) return;
  if (!task.scheduledDayHours) task.scheduledDayHours = {};
  if (isNaN(hrs) || hrs < 0) hrs = 0;
  task.scheduledDayHours[iso] = hrs;
  render();
}

function plannerClearDayHours(catId, taskId, iso) {
  pushUndo();
  const cat  = state.categories.find(c => c.id === catId);
  const task = cat && cat.tasks.find(t => t.id === taskId);
  if (!task || !task.scheduledDayHours) return;
  delete task.scheduledDayHours[iso];
  render();
}

let _openHrsPopover = null;
function toggleHrsPopover(popoverId, catId, taskId, iso, currentHrs) {
  // Close any open popover first
  if (_openHrsPopover && _openHrsPopover !== popoverId) {
    const old = document.getElementById(_openHrsPopover);
    if (old) old.style.display = 'none';
  }
  const el = document.getElementById(popoverId);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  _openHrsPopover = isOpen ? null : popoverId;
  if (!isOpen) {
    // Focus the input
    setTimeout(() => {
      const inp = document.getElementById(popoverId + '-inp');
      if (inp) { inp.focus(); inp.select(); }
    }, 50);
  }
}

// Clear all scheduled days from all tasks
function plannerClearAll() {
  if (!confirm('Remove all scheduled days from every task? This cannot be undone easily.')) return;
  pushUndo();
  for (const cat of state.categories) {
    for (const t of (cat.tasks||[])) {
      t.scheduledDays = [];
      t.scheduledDayHours = {};
    }
  }
  render();
}

// Auto-fill: for each UNPLACED task (no future scheduled days), spread across available workdays up to deadline
function plannerAutoFill() {
  pushUndo();
  const today = new Date(); today.setHours(0,0,0,0);
  function toISO(d) { return d.toISOString().slice(0,10); }
  const todayISO = toISO(today);

  // Build day load from already-scheduled tasks
  const dayLoad = {};
  const allTasks = [];
  for (const cat of state.categories) {
    for (const t of (cat.tasks||[])) {
      if (t.status === 'done') continue;
      allTasks.push({...t, catId: cat.id});
    }
  }
  for (const t of allTasks) {
    if (!t.scheduledDays) continue;
    const rem = remainingHours(t);
    const futureDays = t.scheduledDays.filter(d => d >= todayISO);
    if (!futureDays.length) continue;
    const perDay = rem / futureDays.length;
    for (const d of futureDays) dayLoad[d] = (dayLoad[d]||0) + perDay;
  }

  const dayAvail = state.weeklyHours / 7;
  const DAYS     = 16 * 7;

  // Only truly unplaced tasks: those with no future scheduled days at all
  const unscheduled = allTasks
    .filter(t => !t.scheduledDays || !t.scheduledDays.some(d => d >= todayISO))
    .sort((a,b) => (a.dueDate||'9999') < (b.dueDate||'9999') ? -1 : 1);

  for (const t of unscheduled) {
    const cat  = state.categories.find(c => c.id === t.catId);
    const task = cat && cat.tasks.find(tk => tk.id === t.id);
    if (!task) continue;
    let rem = remainingHours(task);
    if (rem <= 0) continue;

    const lastISO = task.dueDate || (() => {
      const d = new Date(today); d.setDate(d.getDate() + DAYS); return toISO(d);
    })();

    // Collect available days from today to deadline
    const assignedDays = [];
    const cur = new Date(today);
    while (toISO(cur) <= lastISO && rem > 0.05) {
      const iso   = toISO(cur);
      const space = Math.max(dayAvail - (dayLoad[iso]||0), 0);
      if (space > 0.05) {
        assignedDays.push(iso);
        dayLoad[iso] = (dayLoad[iso]||0) + Math.min(rem / Math.max(1, assignedDays.length), space);
        rem -= Math.min(rem / Math.max(1, assignedDays.length), space);
      }
      cur.setDate(cur.getDate() + 1);
    }
    if (assignedDays.length > 0) task.scheduledDays = assignedDays;
  }

  render();
}


// ── Boot ───────────────────────────────────────────────────────────────
render();
</script>
